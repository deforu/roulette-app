    function renderGenres() {
      const listContainers = [genreList, drawerGenreList];
      listContainers.forEach((container) => {
        container.innerHTML = "";
      });

      const filterGroups = getFilterGroups();
      const activeFilterKeys = new Set(filterGroups.map((group) => group.filterKey));
      [...expandedGenreKeys].forEach((filterKey) => {
        if (!activeFilterKeys.has(filterKey)) {
          expandedGenreKeys.delete(filterKey);
        }
      });
      const visibleGroupCount = filterGroups.filter(
        (group) => getFilterSetting(group.filterKey).visible
      ).length;
      const totalGroupCount = filterGroups.length;
      const locked = isFilterLocked() || genreEditor !== null;
      const countText = `${visibleGroupCount} / ${totalGroupCount}`;

      genreCount.textContent = countText;
      drawerGenreCount.textContent = countText;
      [showAllGenresButton, drawerShowAllGenresButton].forEach((button) => {
        button.disabled = locked || totalGroupCount === 0 || visibleGroupCount === totalGroupCount;
      });
      [hideAllGenresButton, drawerHideAllGenresButton].forEach((button) => {
        button.disabled = locked || totalGroupCount === 0 || visibleGroupCount === 0;
      });
      [ratioModeButton, mobileRatioModeButton].forEach((button) => {
        button.disabled = locked;
        button.textContent = ratioEnabled ? "比率 ON" : "比率 OFF";
        button.classList.toggle("is-off", !ratioEnabled);
        button.setAttribute("aria-pressed", String(ratioEnabled));
        button.title = ratioEnabled
          ? "ジャンル比率を無効にして、全候補を同じ確率にする"
          : "ジャンル比率を有効にする";
      });
      [addGenreButton, drawerAddGenreButton].forEach((button) => {
        button.disabled = locked;
      });
      [importButton, exportButton, drawerImportButton, drawerExportButton, resetButton, drawerResetButton]
        .forEach((button) => {
          button.disabled = locked;
        });

      if (totalGroupCount === 0 && !genreEditor) {
        listContainers.forEach((container) => {
          const empty = document.createElement("li");
          empty.className = "empty-state";
          empty.textContent = "ジャンルがありません";
          container.appendChild(empty);
        });
      }

      filterGroups.forEach((group, index) => {
        listContainers.forEach((container, containerIndex) => {
          const surface = containerIndex === 0 ? "desktop" : "drawer";
          const editingThisGroup = genreEditor?.mode === "existing"
            && genreEditor.originalFilterKey === group.filterKey;
          container.appendChild(
            editingThisGroup
              ? createGenreEditorItem(index, surface)
              : createGenreListItem(group, index, locked, surface)
          );
        });
      });

      if (genreEditor?.mode === "new") {
        listContainers.forEach((container, containerIndex) => {
          const surface = containerIndex === 0 ? "desktop" : "drawer";
          container.appendChild(createGenreEditorItem(filterGroups.length, surface));
        });
      }
    }

    function renderSelectedItems() {
      selectedGroupsContainer.innerHTML = "";
      selectedCount.textContent = getSelectedTotalCount();

      const locked = isFilterLocked() || genreEditor !== null;
      const hasSelectedItems = selectedItems.length > 0;
      const restorableCount = selectedItems.filter(
        (candidate) => !candidateAlreadyExistsInGenre(candidate)
      ).length;
      reviveAllButton.disabled = locked || restorableCount === 0;
      saveSelectedImageButton.disabled = !hasSelectedItems;
      copySelectedImageButton.disabled = !hasSelectedItems;
      shareSelectedImageButton.disabled = !hasSelectedItems;
      reviveAllButton.title = restorableCount === 0
        ? "すべての選択済み候補が復活中です"
        : `未復活の${restorableCount}件をルーレット候補へ戻す`;

      if (selectedItems.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "決定した項目がここに表示されます";
        selectedGroupsContainer.appendChild(empty);
        return;
      }

      const genreGroups = aggregateByGenre(selectedItems);

      genreGroups.forEach((values, genre) => {
        const section = document.createElement("section");
        section.className = "selected-group";

        const title = document.createElement("h3");
        title.textContent = displayGenre(genre);

        const list = document.createElement("ul");
        list.className = "selected-candidates";

        values.forEach((candidate) => {
          const item = document.createElement("li");
          const alreadyRevived = candidateAlreadyExistsInGenre(candidate);

          const row = document.createElement("div");
          row.className = alreadyRevived
            ? "selected-candidate-row is-revived"
            : "selected-candidate-row";

          const name = document.createElement("span");
          name.className = "selected-candidate-name";
          const selectionCount = Math.max(1, Number(candidate.count) || 1);
          name.textContent = selectionCount > 1
            ? `${candidate.value}（${selectionCount}回）`
            : candidate.value;

          const reviveButton = document.createElement("button");
          reviveButton.className = "revive-button";
          reviveButton.type = "button";
          reviveButton.textContent = "復活";
          reviveButton.disabled = locked || alreadyRevived;
          reviveButton.setAttribute(
            "aria-label",
            alreadyRevived
              ? `${formatResult(candidate)}はすでにルーレット候補へ復活しています`
              : `${formatResult(candidate)}を選択済み一覧に残したままルーレット候補へ戻す`
          );
          reviveButton.title = alreadyRevived
            ? "すでに復活中です"
            : "選択済みの記録を残したまま候補へ戻す";
          reviveButton.addEventListener("click", () => reviveSelectedItem(candidate));

          row.append(name, reviveButton);
          item.appendChild(row);
          list.appendChild(item);
        });

        section.append(title, list);
        selectedGroupsContainer.appendChild(section);
      });
    }

    function renderState() {
      renderGenres();
      renderSelectedItems();
      renderCandidateSummary();
      renderActionButtons();
      scheduleAppStateSave();
    }

    function fitText(text, maxWidth, baseSize) {
      let size = baseSize;
      context.font = `700 ${size}px sans-serif`;

      while (context.measureText(text).width > maxWidth && size > 16) {
        size -= 1;
        context.font = `700 ${size}px sans-serif`;
      }

      return size;
    }

    function getWheelSegments() {
      if (candidates.length === 0) {
        return [];
      }

      if (!ratioEnabled) {
        const equalProbability = 1 / candidates.length;
        const equalAngle = Math.PI * 2 * equalProbability;
        let angleCursor = 0;

        return candidates.map((candidate, candidateIndex) => {
          const segment = {
            candidate,
            candidateIndex,
            start: angleCursor,
            angle: equalAngle,
            probability: equalProbability
          };
          angleCursor += equalAngle;
          return segment;
        });
      }

      const countsByFilter = new Map();
      candidates.forEach((candidate) => {
        countsByFilter.set(
          candidate.filterKey,
          (countsByFilter.get(candidate.filterKey) || 0) + 1
        );
      });

      const activeFilterKeys = [...countsByFilter.keys()];
      const totalRatio = activeFilterKeys.reduce(
        (sum, filterKey) => sum + getFilterSetting(filterKey).ratio,
        0
      );

      let angleCursor = 0;
      return candidates.map((candidate, candidateIndex) => {
        const setting = getFilterSetting(candidate.filterKey);
        const countInGenre = countsByFilter.get(candidate.filterKey);
        const candidateProbability = (setting.ratio / countInGenre) / totalRatio;
        const angle = Math.PI * 2 * candidateProbability;
        const segment = {
          candidate,
          candidateIndex,
          start: angleCursor,
          angle,
          probability: candidateProbability
        };
        angleCursor += angle;
        return segment;
      });
    }

    function drawWheel(rotation = currentRotation) {
      const width = canvas.width;
      const height = canvas.height;
      const centerX = width / 2;
      const centerY = height / 2;
      const radius = Math.min(width, height) / 2 - 16;

      context.clearRect(0, 0, width, height);
      context.save();
      context.translate(centerX, centerY);
      context.rotate(rotation);

      const segments = getWheelSegments();

      if (segments.length === 0) {
        context.beginPath();
        context.arc(0, 0, radius, 0, Math.PI * 2);
        context.fillStyle = "#e7eaf0";
        context.fill();
        context.fillStyle = "#6d7485";
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.font = "700 31px sans-serif";
        context.fillText(
          allCandidates.length === 0 ? "候補がありません" : "表示中の候補がありません",
          0,
          0
        );
        context.restore();
        return;
      }

      segments.forEach((segment, index) => {
        const startAngle = segment.start - Math.PI / 2;
        const endAngle = startAngle + segment.angle;

        context.beginPath();
        context.moveTo(0, 0);
        context.arc(0, 0, radius, startAngle, endAngle);
        context.closePath();
        context.fillStyle = COLORS[index % COLORS.length];
        context.fill();

        context.strokeStyle = "rgba(255, 255, 255, 0.82)";
        context.lineWidth = 5;
        context.stroke();

        if (segment.angle >= 0.035) {
          context.save();
          context.rotate(startAngle + segment.angle / 2);
          context.translate(radius * 0.63, 0);
          context.rotate(Math.PI / 2);
          context.fillStyle = "#ffffff";
          context.textAlign = "center";
          context.textBaseline = "middle";
          const maxTextWidth = Math.max(72, segment.angle * radius * 0.78);
          const fontSize = fitText(segment.candidate.value, maxTextWidth, candidates.length > 12 ? 24 : 31);
          context.font = `700 ${fontSize}px sans-serif`;
          context.shadowColor = "rgba(0, 0, 0, 0.25)";
          context.shadowBlur = 5;
          context.fillText(segment.candidate.value, 0, 0, maxTextWidth);
          context.restore();
        }
      });

      context.beginPath();
      context.arc(0, 0, radius * 0.12, 0, Math.PI * 2);
      context.fillStyle = "#ffffff";
      context.fill();
      context.lineWidth = 10;
      context.strokeStyle = "rgba(32, 36, 49, 0.15)";
      context.stroke();

      context.restore();
    }

    function normalizeAngle(angle) {
      const fullRotation = Math.PI * 2;
      return ((angle % fullRotation) + fullRotation) % fullRotation;
    }

    function getSegmentAtPointer(segments, rotation) {
      if (segments.length === 0) {
        return null;
      }

      // 針はルーレット上部に固定されています。
      // ルーレットの回転角度を逆向きに戻すことで、針が指す扇形のローカル角度を求めます。
      const pointerAngle = normalizeAngle(-rotation);
      return segments.find(
        (segment) => pointerAngle >= segment.start && pointerAngle < segment.start + segment.angle
      ) || segments[segments.length - 1];
    }

    function renderSoundToggle() {
      soundToggleButton.innerHTML = soundEnabled ? SPEAKER_ON_ICON : SPEAKER_OFF_ICON;
      soundToggleButton.classList.toggle("is-muted", !soundEnabled);
      soundToggleButton.setAttribute("aria-pressed", String(soundEnabled));

      const label = soundEnabled ? "サウンドをオフにする" : "サウンドをオンにする";
      soundToggleButton.setAttribute("aria-label", label);
      soundToggleButton.title = label;
    }

    function startSpinSound() {
      if (!soundEnabled) {
        return;
      }

      spinSound.pause();
      spinSound.currentTime = 0;

      const playPromise = spinSound.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          // 音声ファイルが未配置、またはブラウザに再生を拒否された場合も抽選は続行します。
        });
      }
    }

    function stopSpinSound() {
      spinSound.pause();
      spinSound.currentTime = 0;
    }

    function playResultSound() {
      if (!soundEnabled) {
        return;
      }

      resultSound.pause();
      resultSound.currentTime = 0;

      const playPromise = resultSound.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          // 音声ファイルが未配置、またはブラウザに再生を拒否された場合も処理は続行します。
        });
      }
    }

    function stopResultSound() {
      resultSound.pause();
      resultSound.currentTime = 0;
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      renderSoundToggle();
      scheduleAppStateSave();

      if (!soundEnabled) {
        stopSpinSound();
        stopResultSound();
        return;
      }

      if (spinning) {
        startSpinSound();
      }
    }

    function getRandomSpinImpulse(minImpulse, maxImpulse) {
      return minImpulse + Math.random() * (maxImpulse - minImpulse);
    }

    function addSpinImpulse() {
      const impulse = spinning
        ? getRandomSpinImpulse(ADDITIONAL_SPIN_IMPULSE_MIN, ADDITIONAL_SPIN_IMPULSE_MAX)
        : getRandomSpinImpulse(INITIAL_SPIN_IMPULSE_MIN, INITIAL_SPIN_IMPULSE_MAX);

      angularVelocity = Math.min(
        MAX_ANGULAR_VELOCITY,
        angularVelocity + impulse
      );
    }

    function spinRoulette() {
      if (candidates.length === 0 || currentResultIndex !== null) {
        return;
      }

      const segments = getWheelSegments();
      if (segments.length === 0) {
        return;
      }

      // 回転中のクリックは、新しいアニメーションを作らず現在速度へ回転力を加えます。
      if (spinning) {
        addSpinImpulse();
        setMessage("回転力を追加しました。続けて押すと、さらに加速します。");
        renderActionButtons();
        return;
      }

      spinning = true;
      angularVelocity = 0;
      addSpinImpulse();
      resetResult();
      stopResultSound();
      startSpinSound();
      setMessage("抽選中です。ボタンを押すと回転力を追加できます。");
      renderGenres();
      renderSelectedItems();
      renderActionButtons();

      lastSpinFrameTime = performance.now();
      let lastDisplayedCandidateIndex = null;

      function updateSpinningResult() {
        const pointedSegment = getSegmentAtPointer(segments, currentRotation);
        if (!pointedSegment || pointedSegment.candidateIndex === lastDisplayedCandidateIndex) {
          return;
        }

        lastDisplayedCandidateIndex = pointedSegment.candidateIndex;
        resultValue.textContent = formatResult(pointedSegment.candidate);
      }

      // ボタンを押した直後から、現在針が指している候補を表示します。
      updateSpinningResult();

      function animate(now) {
        const elapsedSeconds = Math.min(
          Math.max((now - lastSpinFrameTime) / 1000, 0),
          MAX_FRAME_DELTA_SECONDS
        );
        lastSpinFrameTime = now;

        currentRotation = normalizeAngle(
          currentRotation + angularVelocity * elapsedSeconds
        );

        // 速度に依存する減衰と低速域の摩擦を組み合わせ、自然に停止させます。
        angularVelocity *= Math.pow(
          ANGULAR_VELOCITY_RETAINED_PER_SECOND,
          elapsedSeconds
        );
        angularVelocity = Math.max(
          0,
          angularVelocity - LOW_SPEED_FRICTION * elapsedSeconds
        );

        drawWheel(currentRotation);
        updateSpinningResult();

        if (angularVelocity > STOP_ANGULAR_VELOCITY) {
          spinAnimationFrameId = requestAnimationFrame(animate);
          return;
        }

        angularVelocity = 0;
        spinAnimationFrameId = null;
        lastSpinFrameTime = null;
        stopSpinSound();

        const finalSegment = getSegmentAtPointer(segments, currentRotation);
        if (!finalSegment) {
          spinning = false;
          renderState();
          setMessage("抽選結果を取得できませんでした。もう一度お試しください。", "error");
          return;
        }

        currentResultIndex = finalSegment.candidateIndex;
        resultValue.textContent = formatResult(finalSegment.candidate);
        playResultSound();
        spinning = false;
        renderState();
        setMessage("「決定」または「保留」を選んでください。");
      }

      spinAnimationFrameId = requestAnimationFrame(animate);
    }

    function removeCandidateFromInput(candidate) {
      const group = inputGroups.find((item) => item.id === candidate.groupId);
      if (!group) {
        return;
      }

      const values = normalizeItems(group.itemsText);
      const removeIndex = values.indexOf(candidate.value);
      if (removeIndex !== -1) {
        values.splice(removeIndex, 1);
      }
      group.itemsText = values.join("\n");
    }

    function decideResult() {
      if (currentResultIndex === null || !candidates[currentResultIndex]) {
        return;
      }

      const decided = candidates[currentResultIndex];
      const allCandidateIndex = allCandidates.indexOf(decided);
      if (allCandidateIndex !== -1) {
        allCandidates.splice(allCandidateIndex, 1);
      }

      const selectedRecord = addSelectedItem(decided);
      removeCandidateFromInput(decided);
      syncFilterSettings();
      updateVisibleCandidates();
      currentRotation = 0;
      resetResult();
      renderState();
      drawWheel(0);
      setMessage(
        selectedRecord.count > 1
          ? `「${formatResult(decided)}」の選択回数が${selectedRecord.count}回になりました。`
          : `「${formatResult(decided)}」を選択済みに追加しました。`,
        "success"
      );
    }

    function findRevivalTargetGroup(candidate) {
      const normalizedGenre = normalizeGenreName(candidate.genre);

      const matchingGroup = inputGroups.find(
        (group) => normalizeGenreName(group.genre) === normalizedGenre
      );
      if (matchingGroup) {
        return matchingGroup;
      }

      const newGroup = createGroup(normalizedGenre, "");
      inputGroups.push(newGroup);
      return newGroup;
    }

    function candidateAlreadyExistsInGenre(candidate) {
      const normalizedGenre = normalizeGenreName(candidate.genre);

      return inputGroups.some((group) => {
        if (normalizeGenreName(group.genre) !== normalizedGenre) {
          return false;
        }
        return normalizeItems(group.itemsText).includes(candidate.value);
      });
    }

    function reviveSelectedItem(candidate) {
      if (isFilterLocked()) {
        return;
      }

      if (!findSelectedItem(candidate)) {
        return;
      }

      const alreadyExists = candidateAlreadyExistsInGenre(candidate);
      if (!alreadyExists) {
        const targetGroup = findRevivalTargetGroup(candidate);
        const values = normalizeItems(targetGroup.itemsText);
        values.push(candidate.value);
        targetGroup.itemsText = values.join("\n");
      }

      allCandidates = buildCandidates();
      syncFilterSettings();
      updateVisibleCandidates();
      currentRotation = 0;
      resetResult();
      renderState();
      drawWheel(0);

      setMessage(
        alreadyExists
          ? `「${formatResult(candidate)}」はすでに復活中です。選択済み一覧には残しています。`
          : `「${formatResult(candidate)}」を候補へ復活させました。選択済み一覧には記録を残しています。`,
        "success"
      );
    }

    function reviveAllSelectedItems() {
      if (isFilterLocked() || selectedItems.length === 0) {
        return;
      }

      let revivedCount = 0;

      selectedItems.forEach((candidate) => {
        if (candidateAlreadyExistsInGenre(candidate)) {
          return;
        }

        const targetGroup = findRevivalTargetGroup(candidate);
        const values = normalizeItems(targetGroup.itemsText);
        values.push(candidate.value);
        targetGroup.itemsText = values.join("\n");
        revivedCount += 1;
      });

      if (revivedCount === 0) {
        renderSelectedItems();
        setMessage("すべての選択済み候補がすでに復活中です。");
        return;
      }

      allCandidates = buildCandidates();
      syncFilterSettings();
      updateVisibleCandidates();
      currentRotation = 0;
      resetResult();
      renderState();
      drawWheel(0);
      setMessage(
        `${revivedCount}件の選択済み候補を一括で復活させました。選択済み一覧には記録を残しています。`,
        "success"
      );
    }

    function holdResult() {
      if (currentResultIndex === null || !candidates[currentResultIndex]) {
        return;
      }

      const heldItem = candidates[currentResultIndex];
      resetResult();
      renderState();
      setMessage(`「${formatResult(heldItem)}」は候補に残しました。`);
    }

    function focusGenreEditor(surface, field = "genre") {
      window.requestAnimationFrame(() => {
        const container = surface === "drawer" ? drawerGenreList : genreList;
        container.querySelector(`[data-editor-field="${field}"]`)?.focus();
      });
    }

    function startGenreEdit(filterKey, surface) {
      if (isFilterLocked() || genreEditor) {
        return;
      }

      const group = getFilterGroups().find((entry) => entry.filterKey === filterKey);
      if (!group) {
        return;
      }

      const setting = getFilterSetting(filterKey);
      expandedGenreKeys.add(filterKey);
      genreEditor = {
        mode: "existing",
        originalFilterKey: filterKey,
        genre: group.genre,
        itemsText: group.values.join("\n"),
        ratio: setting.ratio,
        visible: setting.visible,
        surface
      };
      renderGenres();
      renderActionButtons();
      focusGenreEditor(surface);
    }

    function startNewGenre(surface) {
      if (isFilterLocked() || genreEditor) {
        return;
      }

      genreEditor = {
        mode: "new",
        originalFilterKey: null,
        genre: "",
        itemsText: "",
        ratio: 1,
        visible: true,
        surface
      };
      renderGenres();
      renderActionButtons();
      focusGenreEditor(surface);
    }

    function cancelGenreEdit() {
      if (!genreEditor) {
        return;
      }
      genreEditor = null;
      renderGenres();
      renderActionButtons();
      setMessage("編集をキャンセルしました。");
    }

    function rebuildAfterGenreChange() {
      allCandidates = buildCandidates();
      syncFilterSettings();
      updateVisibleCandidates();
      currentRotation = 0;
      resetResult();
      renderState();
      drawWheel(0);
    }

    function saveGenreEdit() {
      if (!genreEditor || isFilterLocked()) {
        return;
      }

      const draft = { ...genreEditor };
      const genre = normalizeGenreName(draft.genre);
      const values = normalizeItems(draft.itemsText);
      const ratio = Number(draft.ratio);
      if (values.length === 0) {
        setMessage("候補を1件以上入力してください。", "error");
        focusGenreEditor(draft.surface, "itemsText");
        return;
      }
      if (!Number.isFinite(ratio) || ratio < MIN_RATIO) {
        setMessage(`比率は${MIN_RATIO}以上で入力してください。`, "error");
        focusGenreEditor(draft.surface, "ratio");
        return;
      }

      const targetFilterKey = getFilterKeyFromGenre(genre);
      const sourceFilterKey = draft.originalFilterKey;
      const targetAlreadyExists = getFilterGroups().some(
        (group) => group.filterKey === targetFilterKey && group.filterKey !== sourceFilterKey
      );
      const keysToReplace = new Set([targetFilterKey]);
      if (sourceFilterKey) {
        keysToReplace.add(sourceFilterKey);
      }

      const targetValues = targetAlreadyExists
        ? inputGroups
            .filter((group) => getFilterKey(group) === targetFilterKey)
            .flatMap((group) => normalizeItems(group.itemsText))
        : [];
      const mergedValues = normalizeItems([...targetValues, ...values].join("\n"));
      const firstAffectedIndex = inputGroups.findIndex(
        (group) => keysToReplace.has(getFilterKey(group))
      );
      const remainingGroups = inputGroups.filter(
        (group) => !keysToReplace.has(getFilterKey(group))
      );
      const insertionIndex = firstAffectedIndex === -1
        ? remainingGroups.length
        : inputGroups
            .slice(0, firstAffectedIndex)
            .filter((group) => !keysToReplace.has(getFilterKey(group))).length;
      remainingGroups.splice(insertionIndex, 0, createGroup(genre, mergedValues.join("\n")));
      inputGroups = remainingGroups;

      if (!targetAlreadyExists || targetFilterKey === sourceFilterKey) {
        filterSettings.set(targetFilterKey, {
          visible: draft.visible,
          ratio: Number(ratio.toFixed(2))
        });
      }

      genreEditor = null;
      expandedGenreKeys.add(targetFilterKey);
      rebuildAfterGenreChange();
      setMessage(
        targetAlreadyExists
          ? `${displayGenre(genre)}へ候補を統合しました。既存の比率と表示設定を使用します。`
          : `${displayGenre(genre)}の編集内容を保存しました。`,
        "success"
      );
    }

    function deleteEditingGenre() {
      if (!genreEditor || genreEditor.mode !== "existing" || isFilterLocked()) {
        return;
      }

      const label = getFilterGroupLabel(genreEditor.originalFilterKey);
      const count = normalizeItems(genreEditor.itemsText).length;
      if (!window.confirm(`「${label}」と登録候補${count}件を削除しますか？`)) {
        return;
      }

      const deletedFilterKey = genreEditor.originalFilterKey;
      inputGroups = inputGroups.filter((group) => getFilterKey(group) !== deletedFilterKey);
      if (inputGroups.length === 0) {
        inputGroups = [createGroup()];
      }
      genreEditor = null;
      expandedGenreKeys.delete(deletedFilterKey);
      rebuildAfterGenreChange();
      setMessage(`「${label}」を削除しました。選択済み履歴は保持しています。`, "success");
    }

    function resetAll() {
      stopSpinSound();
      stopResultSound();
      inputGroups = createDefaultGroups();
      filterSettings = new Map();
      expandedGenreKeys.clear();
      genreEditor = null;
      ratioEnabled = true;
      allCandidates = buildCandidates();
      syncFilterSettings();
      updateVisibleCandidates();
      selectedItems = [];
      currentRotation = 0;
      resetResult();
      renderState();
      drawWheel(0);
      setMessage("初期状態に戻しました。");
    }

    function getFilterGroupLabel(filterKey) {
      const filterGroup = getFilterGroups().find((group) => group.filterKey === filterKey);
      return filterGroup ? displayGenre(filterGroup.genre) : "ジャンル";
    }

    function applyGenreVisibility(filterKey, visible) {
      if (isFilterLocked()) {
        return;
      }

      const setting = getFilterSetting(filterKey);
      setting.visible = visible;
      updateVisibleCandidates();
      currentRotation = 0;
      resetResult();
      renderState();
      drawWheel(0);
      setMessage(
        `${getFilterGroupLabel(filterKey)}をルーレットで${visible ? "表示" : "非表示"}にしました。`
      );
    }

    function applyAllGenreVisibility(visible) {
      if (isFilterLocked()) {
        return;
      }

      getFilterGroups().forEach((group) => {
        getFilterSetting(group.filterKey).visible = visible;
      });
      updateVisibleCandidates();
      currentRotation = 0;
      resetResult();
      renderState();
      drawWheel(0);
      setMessage(visible ? "すべてのジャンルを表示しました。" : "すべてのジャンルを非表示にしました。");
    }

    function updateGenreRatio(filterKey, rawValue) {
      if (isFilterLocked() || !ratioEnabled) {
        return;
      }

      const parsed = Number(rawValue);
      const isValid = Number.isFinite(parsed) && parsed > 0;
      const normalized = isValid ? Math.max(MIN_RATIO, parsed) : 1;
      const rounded = Number(normalized.toFixed(2));
      getFilterSetting(filterKey).ratio = rounded;
      currentRotation = 0;
      renderState();
      drawWheel(0);

      if (!isValid || parsed < MIN_RATIO) {
        setMessage(`比率は${MIN_RATIO}以上で入力してください。値を${formatRatio(rounded)}に調整しました。`, "error");
        return;
      }

      setMessage(`${getFilterGroupLabel(filterKey)}の比率を${formatRatio(rounded)}に変更しました。`, "success");
    }

    function toggleRatioMode() {
      if (isFilterLocked()) {
        return;
      }

      ratioEnabled = !ratioEnabled;
      currentRotation = 0;
      resetResult();
      renderState();
      drawWheel(0);
      setMessage(
        ratioEnabled
          ? "ジャンル比率を有効にしました。各ジャンルの比率を設定できます。"
          : "ジャンル比率を無効にしました。表示中の全候補が同じ確率になります。",
        "success"
      );
    }

    const CSV_COLUMN_ALIASES = {
      candidate: ["候補", "候補名", "candidate", "item", "value"],
      genre: ["ジャンル", "genre", "category"],
      ratio: ["ジャンル比率", "比率", "ratio", "genreratio", "genre_ratio"],
      visible: ["ジャンル表示", "表示状態", "表示", "visible", "visibility"],
      selected: ["選択済み", "選択済みかどうか", "selected", "isselected", "is_selected"],
      selectionCount: ["選択回数", "重複数", "回数", "selectedcount", "selectioncount", "selected_count", "selection_count"],
      ratioEnabled: ["比率設定", "比率有効", "比率モード", "ratioenabled", "ratio_enabled"]
    };

    function normalizeCsvHeader(value) {
      return String(value ?? "")
        .replace(/^\uFEFF/, "")
        .trim()
        .toLowerCase()
        .replace(/[\s　-]/g, "");
    }

    function findCsvColumn(headers, aliases) {
      const normalizedAliases = aliases.map(normalizeCsvHeader);
      return headers.findIndex((header) => normalizedAliases.includes(normalizeCsvHeader(header)));
    }

    function parseCsv(text) {
      const source = String(text ?? "").replace(/^\uFEFF/, "");
      const rows = [];
      let row = [];
      let field = "";
      let inQuotes = false;

      for (let index = 0; index < source.length; index += 1) {
        const character = source[index];

        if (inQuotes) {
          if (character === '"') {
            if (source[index + 1] === '"') {
              field += '"';
              index += 1;
            } else {
              inQuotes = false;
            }
          } else {
            field += character;
          }
          continue;
        }

        if (character === '"') {
          inQuotes = true;
          continue;
        }

        if (character === ",") {
          row.push(field);
          field = "";
          continue;
        }

        if (character === "\n") {
          row.push(field);
          rows.push(row);
          row = [];
          field = "";
          continue;
        }

        if (character !== "\r") {
          field += character;
        }
      }

      if (inQuotes) {
        throw new Error("CSV内の引用符が閉じられていません。");
      }

      if (field !== "" || row.length > 0) {
        row.push(field);
        rows.push(row);
      }

      return rows.filter((values) => values.some((value) => String(value).trim() !== ""));
    }

    function parseCsvRatio(value, rowNumber) {
      const raw = String(value ?? "").trim();
      if (!raw) {
        return 1;
      }

      const parsed = Number(raw);
      if (!Number.isFinite(parsed) || parsed < MIN_RATIO) {
        throw new Error(`${rowNumber}行目の比率は${MIN_RATIO}以上の数値で入力してください。`);
      }
      return Number(parsed.toFixed(2));
    }

    function parseCsvSelectionCount(value, defaultValue, rowNumber) {
      const raw = String(value ?? "").trim();
      if (!raw) {
        return defaultValue;
      }

      const parsed = Number(raw);
      if (!Number.isInteger(parsed) || parsed < 1) {
        throw new Error(`${rowNumber}行目の選択回数は1以上の整数で入力してください。`);
      }
      return parsed;
    }

    function parseCsvBoolean(value, defaultValue, type, rowNumber) {
      const raw = String(value ?? "").trim();
      if (!raw) {
        return defaultValue;
      }

      const normalized = raw.toLowerCase();
      const commonTrue = ["true", "1", "yes", "y", "on"];
      const commonFalse = ["false", "0", "no", "n", "off"];
      const trueValues = type === "visible"
        ? [...commonTrue, "表示", "表示中", "visible"]
        : type === "selected"
          ? [...commonTrue, "選択済み", "決定済み", "selected"]
          : [...commonTrue, "有効", "比率有効", "enabled"];
      const falseValues = type === "visible"
        ? [...commonFalse, "非表示", "hidden"]
        : type === "selected"
          ? [...commonFalse, "未選択", "未決定", "候補"]
          : [...commonFalse, "無効", "比率無効", "disabled"];

      if (trueValues.includes(normalized)) {
        return true;
      }
      if (falseValues.includes(normalized)) {
        return false;
      }

      const fieldName = type === "visible"
        ? "表示状態"
        : type === "selected"
          ? "選択済み状態"
          : "比率設定";
      throw new Error(`${rowNumber}行目の${fieldName}を判定できません。`);
    }

    function escapeCsvValue(value) {
      const text = String(value ?? "");
      return /[",\r\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function getCandidateExportSetting(candidate) {
      if (filterSettings.has(candidate.filterKey)) {
        return getFilterSetting(candidate.filterKey);
      }
      return {
        ratio: candidate.savedRatio ?? 1,
        visible: candidate.savedVisible ?? true
      };
    }

    function exportCsv() {
      if (isFilterLocked()) {
        return;
      }

      const exportCandidates = buildCandidates();
      const rows = [["ジャンル", "候補", "ジャンル比率", "ジャンル表示", "選択済み", "選択回数", "比率設定"]];

      exportCandidates.forEach((candidate) => {
        const setting = getCandidateExportSetting(candidate);
        rows.push([
          candidate.genre,
          candidate.value,
          formatRatio(setting.ratio),
          setting.visible ? "true" : "false",
          "false",
          "",
          ratioEnabled ? "true" : "false"
        ]);
      });

      selectedItems.forEach((candidate) => {
        const setting = getCandidateExportSetting(candidate);
        rows.push([
          candidate.genre,
          candidate.value,
          formatRatio(setting.ratio),
          setting.visible ? "true" : "false",
          "true",
          String(Math.max(1, Number(candidate.count) || 1)),
          ratioEnabled ? "true" : "false"
        ]);
      });

      const csv = rows.map((row) => row.map(escapeCsvValue).join(",")).join("\r\n");
      const blob = new Blob(["\uFEFF", csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const now = new Date();
      const stamp = [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0"),
        "-",
        String(now.getHours()).padStart(2, "0"),
        String(now.getMinutes()).padStart(2, "0")
      ].join("");
      link.href = url;
      link.download = `roulette-settings-${stamp}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      setMessage(`${rows.length - 1}件のデータをCSVで出力しました。`, "success");
    }

    function importCsvText(text, fileName) {
      const rows = parseCsv(text);
      if (rows.length < 2) {
        throw new Error("CSVに読み込めるデータ行がありません。");
      }

      const headers = rows[0];
      const columns = {
        candidate: findCsvColumn(headers, CSV_COLUMN_ALIASES.candidate),
        genre: findCsvColumn(headers, CSV_COLUMN_ALIASES.genre),
        ratio: findCsvColumn(headers, CSV_COLUMN_ALIASES.ratio),
        visible: findCsvColumn(headers, CSV_COLUMN_ALIASES.visible),
        selected: findCsvColumn(headers, CSV_COLUMN_ALIASES.selected),
        selectionCount: findCsvColumn(headers, CSV_COLUMN_ALIASES.selectionCount),
        ratioEnabled: findCsvColumn(headers, CSV_COLUMN_ALIASES.ratioEnabled)
      };

      if (columns.candidate === -1) {
        throw new Error("CSVの見出しに必須列「候補」がありません。");
      }

      const activeByGenre = new Map();
      const importedSelectedItems = [];
      const importedSelectedByKey = new Map();
      const importedSettings = new Map();
      let importedCount = 0;
      let importedRatioEnabled = true;
      let ratioModeWasSpecified = false;

      rows.slice(1).forEach((row, rowIndex) => {
        const rowNumber = rowIndex + 2;
        const candidateValue = String(row[columns.candidate] ?? "").trim();
        const rowHasOtherValues = row.some((value, index) => index !== columns.candidate && String(value ?? "").trim() !== "");

        if (!candidateValue) {
          if (rowHasOtherValues) {
            throw new Error(`${rowNumber}行目の候補が空欄です。`);
          }
          return;
        }

        const genre = columns.genre === -1 ? "" : normalizeGenreName(row[columns.genre]);
        const filterKey = getFilterKeyFromGenre(genre);
        const ratioCell = columns.ratio === -1 ? "" : row[columns.ratio];
        const visibleCell = columns.visible === -1 ? "" : row[columns.visible];
        const selectedCell = columns.selected === -1 ? "" : row[columns.selected];
        const selectionCountCell = columns.selectionCount === -1 ? "" : row[columns.selectionCount];
        const ratioEnabledCell = columns.ratioEnabled === -1 ? "" : row[columns.ratioEnabled];

        if (String(ratioEnabledCell ?? "").trim() !== "") {
          const rowRatioEnabled = parseCsvBoolean(ratioEnabledCell, true, "ratioEnabled", rowNumber);
          if (ratioModeWasSpecified && rowRatioEnabled !== importedRatioEnabled) {
            throw new Error(`${rowNumber}行目の比率設定が他の行と一致していません。`);
          }
          importedRatioEnabled = rowRatioEnabled;
          ratioModeWasSpecified = true;
        }

        if (!importedSettings.has(filterKey)) {
          importedSettings.set(filterKey, { visible: true, ratio: 1 });
        }
        const setting = importedSettings.get(filterKey);

        if (String(ratioCell ?? "").trim() !== "") {
          setting.ratio = parseCsvRatio(ratioCell, rowNumber);
        }
        if (String(visibleCell ?? "").trim() !== "") {
          setting.visible = parseCsvBoolean(visibleCell, true, "visible", rowNumber);
        }

        const rawSelectionCount = String(selectionCountCell ?? "").trim();
        const selectionCount = parseCsvSelectionCount(selectionCountCell, 1, rowNumber);
        const isSelected = parseCsvBoolean(
          selectedCell,
          rawSelectionCount !== "",
          "selected",
          rowNumber
        );
        const importedCandidate = {
          groupId: null,
          filterKey,
          genre,
          value: candidateValue,
          count: selectionCount,
          savedRatio: setting.ratio,
          savedVisible: setting.visible
        };

        if (isSelected) {
          const selectedKey = getSelectedItemKey(importedCandidate);
          const existingSelected = importedSelectedByKey.get(selectedKey);
          if (existingSelected) {
            existingSelected.count += selectionCount;
          } else {
            importedSelectedByKey.set(selectedKey, importedCandidate);
            importedSelectedItems.push(importedCandidate);
          }
        } else {
          if (!activeByGenre.has(filterKey)) {
            activeByGenre.set(filterKey, {
              genre,
              values: [],
              uniqueValues: new Set()
            });
          }
          const activeGroup = activeByGenre.get(filterKey);
          if (!activeGroup.uniqueValues.has(candidateValue)) {
            activeGroup.uniqueValues.add(candidateValue);
            activeGroup.values.push(candidateValue);
          }
        }

        importedCount += 1;
      });

      if (importedCount === 0) {
        throw new Error("CSVに候補データがありません。");
      }

      inputGroups = [...activeByGenre.values()].map((group) =>
        createGroup(group.genre, group.values.join("\n"))
      );
      if (inputGroups.length === 0) {
        inputGroups = [createGroup()];
      }

      filterSettings = importedSettings;
      ratioEnabled = importedRatioEnabled;
      selectedItems = importedSelectedItems;
      allCandidates = buildCandidates();
      selectedItems = selectedItems.map((candidate) => ({
        ...candidate,
        count: Math.max(1, Number(candidate.count) || 1),
        savedRatio: getFilterSetting(candidate.filterKey).ratio,
        savedVisible: getFilterSetting(candidate.filterKey).visible
      }));
      syncFilterSettings();
      updateVisibleCandidates();
      currentRotation = 0;
      resetResult();
      renderState();
      drawWheel(0);
      setMessage(`「${fileName}」から${importedCount}件を復元しました。`, "success");
    }

    function openGenreDrawer() {
      if (!window.matchMedia("(max-width: 980px)").matches) {
        return;
      }

      renderGenres();
      genreDrawer.classList.add("is-open");
      genreDrawerBackdrop.classList.add("is-open");
      genreDrawer.setAttribute("aria-hidden", "false");
      genreDrawerBackdrop.setAttribute("aria-hidden", "false");
      document.body.classList.add("drawer-open");
      window.requestAnimationFrame(() => genreDrawerCloseButton.focus());
    }

    function closeGenreDrawer({ restoreFocus = true } = {}) {
      genreDrawer.classList.remove("is-open");
      genreDrawerBackdrop.classList.remove("is-open");
      genreDrawer.setAttribute("aria-hidden", "true");
      genreDrawerBackdrop.setAttribute("aria-hidden", "true");
      document.body.classList.remove("drawer-open");

      if (restoreFocus && window.matchMedia("(max-width: 980px)").matches) {
        mobileSettingsButton.focus();
      }
    }

    function bindGenreListInteractions(container) {
      container.addEventListener("click", (event) => {
        const row = event.target.closest(".genre-list-row");
        const actionButton = event.target.closest("button[data-action]");
        if (!row || !actionButton) {
          return;
        }

        const filterKey = row.dataset.filterKey;
        const surface = container === drawerGenreList ? "drawer" : "desktop";
        const action = actionButton.dataset.action;

        if (action === "edit-genre") {
          startGenreEdit(filterKey, surface);
          return;
        }
        if (action === "save-genre") {
          saveGenreEdit();
          return;
        }
        if (action === "cancel-genre") {
          cancelGenreEdit();
          return;
        }
        if (action === "delete-genre") {
          deleteEditingGenre();
          return;
        }
        if (action === "editor-toggle-visibility" && genreEditor) {
          genreEditor.visible = !genreEditor.visible;
          renderGenres();
          return;
        }

        if (action === "toggle-candidates") {
          if (expandedGenreKeys.has(filterKey)) {
            expandedGenreKeys.delete(filterKey);
          } else {
            expandedGenreKeys.add(filterKey);
          }

          const expanded = expandedGenreKeys.has(filterKey);
          [genreList, drawerGenreList].forEach((list) => {
            [...list.querySelectorAll(".genre-list-row")].forEach((genreRow) => {
              if (genreRow.dataset.filterKey !== filterKey) {
                return;
              }
              const button = genreRow.querySelector('button[data-action="toggle-candidates"]');
              const candidateList = genreRow.querySelector(".genre-candidate-list");
              button.setAttribute("aria-expanded", String(expanded));
              button.setAttribute(
                "aria-label",
                `${getFilterGroupLabel(filterKey)}の候補一覧を${expanded ? "閉じる" : "開く"}`
              );
              button.querySelector(".genre-expand-icon").textContent = expanded ? "▼" : "▶";
              candidateList.hidden = !expanded;
            });
          });
          return;
        }

        if (action !== "toggle-visibility" || isFilterLocked() || genreEditor) {
          return;
        }

        const setting = getFilterSetting(filterKey);
        applyGenreVisibility(filterKey, !setting.visible);
      });

      container.addEventListener("change", (event) => {
        const ratioInput = event.target.closest('input[data-action="change-ratio"]');
        const row = event.target.closest(".genre-list-row");
        if (!ratioInput || !row || isFilterLocked() || genreEditor) {
          return;
        }

        updateGenreRatio(row.dataset.filterKey, ratioInput.value);
      });

      container.addEventListener("input", (event) => {
        const field = event.target.dataset.editorField;
        if (!genreEditor || !field) {
          return;
        }
        genreEditor[field] = field === "ratio" ? Number(event.target.value) : event.target.value;
      });
    }

    bindGenreListInteractions(genreList);
    bindGenreListInteractions(drawerGenreList);

    function openCsvPicker() {
      if (isFilterLocked() || genreEditor) {
        return;
      }
      csvFileInput.click();
    }

    importButton.addEventListener("click", openCsvPicker);
    drawerImportButton.addEventListener("click", openCsvPicker);
    exportButton.addEventListener("click", exportCsv);
    drawerExportButton.addEventListener("click", exportCsv);
    addGenreButton.addEventListener("click", () => startNewGenre("desktop"));
    drawerAddGenreButton.addEventListener("click", () => startNewGenre("drawer"));
    csvFileInput.addEventListener("change", async () => {
      const [file] = csvFileInput.files;
      if (!file) {
        return;
      }

      try {
        const text = await file.text();
        importCsvText(text, file.name);
      } catch (error) {
        setMessage(error instanceof Error ? error.message : "CSVの読み込みに失敗しました。", "error");
      } finally {
        csvFileInput.value = "";
      }
    });

    showAllGenresButton.addEventListener("click", () => applyAllGenreVisibility(true));
    hideAllGenresButton.addEventListener("click", () => applyAllGenreVisibility(false));
    drawerShowAllGenresButton.addEventListener("click", () => applyAllGenreVisibility(true));
    drawerHideAllGenresButton.addEventListener("click", () => applyAllGenreVisibility(false));
    ratioModeButton.addEventListener("click", toggleRatioMode);
    mobileRatioModeButton.addEventListener("click", toggleRatioMode);
    mobileSettingsButton.addEventListener("click", openGenreDrawer);
    genreDrawerCloseButton.addEventListener("click", () => closeGenreDrawer());
    genreDrawerBackdrop.addEventListener("click", () => closeGenreDrawer());
    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") {
        return;
      }
      if (genreEditor) {
        cancelGenreEdit();
      } else if (genreDrawer.classList.contains("is-open")) {
        closeGenreDrawer();
      }
    });
    window.addEventListener("resize", () => {
      if (window.innerWidth > 980 && genreDrawer.classList.contains("is-open")) {
        closeGenreDrawer({ restoreFocus: false });
      }
    });
    window.addEventListener("pagehide", saveAppState);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState !== "visible") {
        saveAppState();
      }
    });
    soundToggleButton.addEventListener("click", toggleSound);
    saveSelectedImageButton.addEventListener("click", saveSelectedItemsImage);
    copySelectedImageButton.addEventListener("click", copySelectedItemsImage);
    shareSelectedImageButton.addEventListener("click", shareSelectedItemsImage);
    spinButton.addEventListener("click", spinRoulette);
    decisionButton.addEventListener("click", decideResult);
    holdButton.addEventListener("click", holdResult);
    reviveAllButton.addEventListener("click", reviveAllSelectedItems);
    resetButton.addEventListener("click", resetAll);
    drawerResetButton.addEventListener("click", resetAll);

    restoreAppState();
    allCandidates = buildCandidates();
    syncFilterSettings();
    updateVisibleCandidates();
    renderSoundToggle();
    renderState();
    drawWheel();
  </script>
</body>
</html>
