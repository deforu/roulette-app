<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>追加入力で加速できるルーレット v25</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: rgba(255, 255, 255, 0.92);
      --text: #202431;
      --muted: #6d7485;
      --line: #dfe4ee;
      --primary: #5b5bd6;
      --primary-dark: #4747b8;
      --danger: #d9534f;
      --success: #25875f;
      --shadow: 0 18px 48px rgba(41, 49, 75, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(91, 91, 214, 0.13), transparent 34%),
        radial-gradient(circle at bottom right, rgba(37, 135, 95, 0.10), transparent 32%),
        var(--bg);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled,
    input:disabled,
    textarea:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    .page {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    .header {
      margin-bottom: 24px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 8px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: 0.02em;
    }

    .sound-toggle-button {
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 14px;
      color: var(--primary);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 8px 20px rgba(41, 49, 75, 0.10);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

    .sound-toggle-button svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sound-toggle-button:not(:disabled):hover {
      transform: translateY(-2px);
      border-color: rgba(91, 91, 214, 0.52);
      background: #f4f3ff;
    }

    .sound-toggle-button.is-muted {
      color: #8b92a3;
      background: #eceef3;
    }

    .version-note {
      display: inline-flex;
      margin: 0 0 10px;
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--primary-dark);
      background: rgba(91, 91, 214, 0.10);
      font-size: 12px;
      font-weight: 800;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(390px, 440px);
      gap: 24px;
      align-items: start;
    }

    .panel {
      border: 1px solid rgba(223, 228, 238, 0.9);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .roulette-panel {
      padding: 28px;
    }


    .roulette-mobile-summary {
      display: grid;
      grid-template-columns: minmax(40px, 1fr) auto minmax(40px, 1fr);
      align-items: center;
      gap: 10px;
      margin: 0 0 4px;
    }

    .roulette-mobile-summary .mobile-ratio-mode-button,
    .roulette-mobile-summary .mobile-settings-button {
      display: none;
    }

    .roulette-mobile-summary .mobile-candidate-count {
      grid-column: 2;
      justify-self: center;
    }

    .mobile-candidate-count {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      gap: 5px;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .mobile-candidate-count strong {
      color: var(--text);
      font-size: 18px;
      font-variant-numeric: tabular-nums;
    }

    .mobile-candidate-count .count-separator {
      color: #a1a7b4;
      font-size: 17px;
      font-weight: 500;
    }

    .mobile-ratio-mode-button {
      justify-self: start;
      min-width: 88px;
    }

    .mobile-settings-button {
      justify-self: end;
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 11px;
      color: var(--primary);
      background: #ffffff;
      box-shadow: 0 5px 14px rgba(41, 49, 75, 0.09);
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .mobile-settings-button svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mobile-settings-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: rgba(91, 91, 214, 0.52);
      background: #f4f3ff;
    }

    body.drawer-open {
      overflow: hidden;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.42);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.24s ease, visibility 0.24s ease;
    }

    .drawer-backdrop.is-open {
      opacity: 1;
      visibility: visible;
    }

    .genre-drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 1001;
      width: min(88vw, 420px);
      height: 100vh;
      height: 100dvh;
      padding: 20px 18px 28px;
      overflow-y: auto;
      color: #ffffff;
      background: rgba(10, 12, 19, 0.72);
      border-left: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: -20px 0 55px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(18px);
      transform: translateX(100%);
      visibility: hidden;
      transition: transform 0.28s ease, visibility 0.28s ease;
    }

    .genre-drawer.is-open {
      transform: translateX(0);
      visibility: visible;
    }

    .drawer-header {
      position: sticky;
      top: -20px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: -20px -18px 18px;
      padding: 20px 18px 14px;
      background: rgba(10, 12, 19, 0.66);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .drawer-title-group {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .drawer-title-group h2 {
      margin: 0;
      font-size: 19px;
      color: #ffffff;
    }

    .drawer-close-button {
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 11px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
      font-size: 25px;
      line-height: 1;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .drawer-close-button:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    .drawer-filter-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 0 0 16px;
    }

    .drawer-filter-actions .filter-action-button {
      min-height: 42px;
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
    }

    .drawer-filter-actions .filter-action-button:not(:disabled):hover {
      border-color: rgba(255, 255, 255, 0.36);
      background: rgba(255, 255, 255, 0.17);
    }

    .drawer-filter-actions .filter-action-button:disabled {
      color: rgba(255, 255, 255, 0.38);
      border-color: rgba(255, 255, 255, 0.09);
      background: rgba(255, 255, 255, 0.04);
    }

    .drawer-genre-list .list-item {
      border-color: rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
    }

    .drawer-genre-list .item-text {
      color: #ffffff;
    }

    .drawer-genre-list .genre-expand-button:not(:disabled):hover,
    .drawer-genre-list .genre-expand-button:focus-visible {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
    }

    .drawer-genre-list .genre-candidate-list {
      color: rgba(255, 255, 255, 0.82);
      border-top-color: rgba(255, 255, 255, 0.12);
    }

    .drawer-genre-list .item-number {
      color: #d5d2ff;
      background: rgba(137, 126, 255, 0.22);
    }

    .drawer-genre-list .ratio-control {
      color: rgba(255, 255, 255, 0.68);
    }

    .drawer-genre-list .ratio-input {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.17);
      background: rgba(255, 255, 255, 0.1);
    }

    .drawer-genre-list .ratio-input:disabled {
      color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.05);
    }

    .drawer-genre-list .visibility-button {
      color: #d9d6ff;
      border-color: rgba(255, 255, 255, 0.17);
      background: rgba(255, 255, 255, 0.09);
    }

    .drawer-genre-list .visibility-button.is-hidden {
      color: rgba(255, 255, 255, 0.46);
      background: rgba(255, 255, 255, 0.04);
    }

    .drawer-genre-list .list-item.is-hidden {
      border-color: rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.035);
    }

    .drawer-genre-list .empty-state {
      color: rgba(255, 255, 255, 0.68);
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
    }

    .wheel-area {
      position: relative;
      width: min(560px, 100%);
      margin: 0 auto;
      padding-top: 8px;
    }

    .pointer {
      position: absolute;
      z-index: 5;
      top: 0;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 38px solid #242735;
      filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.2));
    }

    .canvas-wrap {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      padding: 10px;
      background: linear-gradient(145deg, #ffffff, #dfe4ee);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.8),
        0 18px 34px rgba(31, 37, 55, 0.18);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .result-card {
      margin-top: 24px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
      text-align: center;
    }

    .result-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .result-value {
      min-height: 48px;
      margin-top: 6px;
      display: grid;
      place-items: center;
      font-size: clamp(24px, 5vw, 38px);
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .controls.is-spin-state {
      grid-template-columns: 1fr;
    }

    .controls.is-result-state {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .button {
      min-height: 52px;
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      font-weight: 800;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .button:not(:disabled):hover {
      transform: translateY(-2px);
    }

    .button-primary {
      color: #ffffff;
      background: var(--primary);
      box-shadow: 0 10px 20px rgba(91, 91, 214, 0.28);
    }

    .button-primary:not(:disabled):hover {
      background: var(--primary-dark);
    }

    .button-decision {
      color: #ffffff;
      background: var(--success);
    }

    .button-hold {
      color: #4f5668;
      background: #edf0f5;
      border: 1px solid #d9deea;
    }

    .left-column {
      min-width: 0;
      display: grid;
      gap: 24px;
      align-content: start;
    }

    .sidebar {
      min-width: 0;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .genre-panel {
      padding: 22px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .count-badge {
      min-width: 58px;
      height: 28px;
      padding: 0 9px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #ffffff;
      background: var(--primary);
      font-size: 13px;
      font-weight: 800;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      color: var(--text);
      background: #ffffff;
      outline: none;
    }

    input[type="text"] {
      min-height: 44px;
    }

    textarea {
      min-height: 128px;
      resize: vertical;
      line-height: 1.6;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(91, 91, 214, 0.12);
    }

    .data-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .button-import,
    .button-export {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 800;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .button-import {
      color: var(--primary-dark);
      background: #f4f3ff;
      border-color: rgba(91, 91, 214, 0.28);
    }

    .button-export {
      color: #1f6f50;
      background: #f3faf7;
      border-color: #cfe6dc;
    }

    .button-import:not(:disabled):hover,
    .button-export:not(:disabled):hover {
      transform: translateY(-1px);
    }

    .button-import:not(:disabled):hover {
      border-color: rgba(91, 91, 214, 0.55);
      background: #eceaff;
    }

    .button-export:not(:disabled):hover {
      border-color: #91c8b0;
      background: #eaf7f0;
    }

    .button-apply {
      color: #ffffff;
      background: #343847;
    }

    .button-reset {
      color: var(--danger);
      background: #fff5f4;
      border: 1px solid #f3cfcd;
    }

    .filter-actions {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      margin-bottom: 12px;
    }

    .filter-action-button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      color: #4f5668;
      background: #ffffff;
      font-size: 12px;
      font-weight: 800;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .filter-action-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: rgba(91, 91, 214, 0.48);
      background: #f4f3ff;
    }

    .ratio-mode-button {
      min-width: 88px;
      color: #ffffff;
      border-color: var(--primary);
      background: var(--primary);
      white-space: nowrap;
    }

    .ratio-mode-button:not(:disabled):hover {
      color: #ffffff;
      border-color: var(--primary-dark);
      background: var(--primary-dark);
    }

    .ratio-mode-button.is-off {
      color: #656d7e;
      border-color: #d7dce6;
      background: #eceff4;
    }

    .ratio-mode-button.is-off:not(:disabled):hover {
      color: #4f5668;
      border-color: #c9cfdb;
      background: #e3e7ee;
    }

    .genre-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 9px;
    }

    .genre-list-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 36px;
      gap: 8px;
      align-items: start;
      min-width: 0;
    }

    .list-item {
      min-width: 0;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
    }

    .genre-edit-actions {
      display: grid;
      gap: 7px;
    }

    .genre-edit-button {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--primary);
      background: #ffffff;
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .genre-edit-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: rgba(91, 91, 214, 0.5);
      background: #f4f3ff;
    }

    .genre-edit-button.save {
      color: var(--success);
    }

    .genre-edit-button.cancel {
      color: var(--muted);
    }

    .genre-edit-button.delete {
      color: var(--danger);
    }

    .genre-editor-card {
      border-color: rgba(91, 91, 214, 0.42);
      background: #faf9ff;
    }

    .genre-editor-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
    }

    .genre-name-input {
      min-width: 0;
      height: 38px;
      padding: 7px 9px;
      border-radius: 10px;
      font-weight: 800;
    }

    .genre-items-input {
      min-height: 150px;
      margin-top: 10px;
      font-size: 13px;
    }

    .add-genre-button {
      width: calc(100% - 44px);
      min-height: 44px;
      margin-top: 12px;
      border: 1px dashed rgba(91, 91, 214, 0.42);
      border-radius: 12px;
      color: var(--primary-dark);
      background: #f8f7ff;
      font-weight: 800;
    }

    .add-genre-button:not(:disabled):hover {
      border-color: var(--primary);
      background: #f1efff;
    }

    .genre-management-actions {
      padding-top: 14px;
      margin-top: 16px;
      border-top: 1px solid var(--line);
    }

    .genre-management-actions .data-actions {
      margin-top: 0;
    }

    .genre-reset-button {
      width: 100%;
      margin-top: 10px;
    }

    .genre-item-header {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .item-number {
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--primary);
      background: rgba(91, 91, 214, 0.11);
      font-size: 12px;
      font-weight: 800;
    }

    .item-text {
      min-width: 0;
      flex: 1;
      overflow-wrap: anywhere;
      line-height: 1.45;
    }

    .genre-expand-button {
      display: flex;
      align-items: center;
      gap: 6px;
      align-self: stretch;
      margin: -4px 0;
      padding: 4px 6px;
      border: 0;
      border-radius: 8px;
      color: var(--text);
      background: transparent;
      text-align: left;
      font: inherit;
      cursor: pointer;
      transition: color 0.16s ease, background 0.16s ease;
    }

    .genre-expand-button:not(:disabled):hover,
    .genre-expand-button:focus-visible {
      color: var(--primary-dark);
      background: #f4f3ff;
      outline: none;
    }

    .genre-expand-icon {
      flex: 0 0 auto;
      width: 12px;
      color: currentColor;
      font-size: 11px;
      line-height: 1;
      text-align: center;
    }

    .genre-candidate-list {
      margin: 10px 0 0 36px;
      padding: 10px 0 0 20px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      font-size: 13px;
      line-height: 1.6;
    }

    .genre-candidate-list li {
      overflow-wrap: anywhere;
    }

    .genre-candidate-list[hidden] {
      display: none;
    }

    .list-item.is-hidden {
      border-color: #e5e8ef;
      background: #f4f5f8;
    }

    .list-item.is-hidden .item-number,
    .list-item.is-hidden .item-text,
    .list-item.is-hidden .genre-candidate-list {
      opacity: 0.5;
    }

    .visibility-button {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--primary);
      background: #ffffff;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .visibility-button svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .visibility-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: rgba(91, 91, 214, 0.52);
      background: #f4f3ff;
    }

    .visibility-button.is-hidden {
      color: #8b92a3;
      background: #eceef3;
    }

    .ratio-control {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .ratio-input {
      width: 66px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 8px;
      color: var(--text);
      background: #ffffff;
      text-align: right;
      font-weight: 800;
      outline: none;
    }

      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(91, 91, 214, 0.12);
    }

    .list-item.is-hidden .ratio-control {
      opacity: 0.62;
    }

    .ratio-control.is-disabled {
      opacity: 0.48;
    }

    @media (max-width: 430px) {
      .genre-list-row {
        grid-template-columns: minmax(0, 1fr) 34px;
        gap: 6px;
      }

      .list-item {
        padding: 10px;
      }

      .genre-edit-button {
        width: 34px;
        height: 34px;
      }

      .item-number {
        display: none;
      }

      .ratio-control span {
        display: none;
      }

      .ratio-input {
        width: 58px;
      }

      .genre-editor-header {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .genre-editor-header .visibility-button {
        grid-column: 2;
      }

    .selected-divider {
      height: 1px;
      margin: 24px 0;
      border: 0;
      background: var(--line);
    }

    .selected-section {
      margin: 0;
      padding: 0;
    }

    .selected-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .selected-header h2 {
      margin: 0;
      font-size: 22px;
    }

    .selected-groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }

    .selected-group {
      min-width: 0;
      padding: 16px 17px;
      border: 1px solid #cfe6dc;
      border-radius: 15px;
      background: #f5fbf8;
    }

      margin: 0 0 10px;
      padding-bottom: 9px;
      border-bottom: 1px solid #d8ebe2;
      color: #1f6f50;
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .selected-candidates {
      margin: 0;
      padding-left: 21px;
      display: grid;
      gap: 7px;
    }

    .selected-candidates li {
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .selected-candidate-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .selected-candidate-name {
      flex: 1;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .revive-button {
      flex: 0 0 auto;
      min-height: 32px;
      border: 1px solid #a9d7c3;
      border-radius: 9px;
      padding: 5px 10px;
      color: #1f6f50;
      background: #ffffff;
      font-size: 12px;
      font-weight: 800;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .revive-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: #6fb795;
      background: #eaf7f0;
    }

    .revive-button:disabled {
      border-color: #d5d9df;
      color: #9ba2ad;
      background: #eef0f3;
      cursor: not-allowed;
      opacity: 1;
    }

    .selected-candidate-row.is-revived .selected-candidate-name {
      color: #9aa1ab;
    }

    .selected-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .selected-export-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .selected-export-button,
    .selected-share-button {
      min-height: 40px;
      border: 1px solid #c6d8f0;
      border-radius: 11px;
      padding: 8px 14px;
      color: #184f86;
      background: #edf4fd;
      font-size: 14px;
      font-weight: 800;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .selected-export-button:not(:disabled):hover,
    .selected-share-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: #83b0e4;
      background: #dfeefd;
    }

    .selected-export-button:disabled,
    .selected-share-button:disabled {
      border-color: #d5d9df;
      color: #9ba2ad;
      background: #eef0f3;
      cursor: not-allowed;
    }

    .selected-share-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 48px;
      padding-inline: 12px;
    }

    .selected-share-button svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    .revive-all-button {
      min-height: 40px;
      border: 1px solid #8fc7ad;
      border-radius: 11px;
      padding: 8px 16px;
      color: #176344;
      background: #eef9f3;
      font-size: 14px;
      font-weight: 800;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .revive-all-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: #5fae89;
      background: #dff3e8;
    }

    .revive-all-button:disabled {
      border-color: #d5d9df;
      color: #9ba2ad;
      background: #eef0f3;
      cursor: not-allowed;
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 28px;
      border: 1px dashed #cbd1dd;
      border-radius: 14px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.64);
    }

    .message {
      min-height: 24px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--success);
    }

    .visually-hidden-file {
      display: none;
    }

    @media (max-width: 980px) {
      html,
      body {
        touch-action: manipulation;
      }

      .main-grid {
        grid-template-columns: 1fr;
      }

      .sidebar {
        grid-template-columns: 1fr;
      }

      .roulette-mobile-summary {
        grid-template-columns: minmax(88px, 1fr) auto minmax(40px, 1fr);
      }

      .roulette-mobile-summary .mobile-ratio-mode-button {
        display: inline-flex;
      }

      .roulette-mobile-summary .mobile-settings-button {
        display: grid;
      }

      .roulette-mobile-summary .mobile-candidate-count {
        grid-column: 2;
        justify-self: center;
      }

      .desktop-ratio-mode-button {
        display: none;
      }

      .genre-panel {
        display: none;
      }

      .filter-actions {
        grid-template-columns: 1fr 1fr;
      }

      .data-actions {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .header-top {
        align-items: flex-start;
      }

      .sound-toggle-button {
        width: 44px;
        height: 44px;
        border-radius: 12px;
      }

      .page {
        width: min(100% - 20px, 1240px);
        padding-top: 24px;
      }

      .roulette-panel,
      .genre-panel {
        padding: 18px;
        border-radius: 18px;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .button-primary {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="header-top">
        <h1>ルーレット</h1>
        <button id="soundToggleButton" class="sound-toggle-button" type="button" aria-pressed="true" aria-label="サウンドをオフにする" title="サウンドをオフにする"></button>
      </div>
      <div class="version-note">ジャンル・候補一体型編集・追加入力加速・履歴保持型候補復活・ジャンル設定ドロワー・CSV保存・サウンド対応版</div>
      <p>ジャンルごとに候補を登録し、表示設定と比率を変更できます。回転中に「さらに回す」を押すと回転力が加わります。比率をオフにすると、表示中の全候補が同じ確率になります。</p>
    </header>

    <div class="main-grid">
      <div class="left-column">
        <section class="panel roulette-panel" aria-label="ルーレット">
          <div class="roulette-mobile-summary" aria-label="抽選設定と候補数">
            <button id="mobileRatioModeButton" class="filter-action-button ratio-mode-button mobile-ratio-mode-button" type="button" aria-pressed="true">比率 ON</button>
            <div class="mobile-candidate-count" aria-label="表示中ジャンルの残り候補数と全体候補数" title="非表示ジャンルを除外し、復活中の候補は重複して数えません">
              <span>残り</span>
              <strong id="remainingCandidateCount">0</strong>
              <span class="count-separator">/</span>
              <span>全体</span>
              <strong id="totalCandidateCount">0</strong>
            </div>
            <button id="mobileSettingsButton" class="mobile-settings-button" type="button" aria-label="ジャンル一覧を開く" title="ジャンル一覧を開く">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="5" cy="6" r="1"></circle>
                <circle cx="5" cy="12" r="1"></circle>
                <circle cx="5" cy="18" r="1"></circle>
                <path d="M9 6h11"></path>
                <path d="M9 12h11"></path>
                <path d="M9 18h11"></path>
              </svg>
            </button>
          </div>

          <div class="wheel-area">
            <div class="pointer" aria-hidden="true"></div>
            <div class="canvas-wrap">
              <canvas id="wheelCanvas" width="900" height="900"></canvas>
            </div>
          </div>

          <div class="result-card" aria-live="polite">
            <div class="result-label">選択結果</div>
            <div id="resultValue" class="result-value">まだ選択されていません</div>
          </div>

          <div id="message" class="message" aria-live="polite"></div>
          <div id="actionControls" class="controls is-spin-state">
            <button id="spinButton" class="button button-primary" type="button">ルーレットを回す</button>
            <button id="decisionButton" class="button button-decision" type="button" hidden disabled>決定</button>
            <button id="holdButton" class="button button-hold" type="button" hidden disabled>保留</button>
          </div>

          <hr class="selected-divider" aria-hidden="true" />

          <section class="selected-section" aria-label="選択済み候補">
            <div class="selected-header">
              <h2>選択済み一覧</h2>
              <span id="selectedCount" class="count-badge" aria-label="選択済み候補数">0</span>
            </div>
            <div id="selectedGroups" class="selected-groups"></div>
            <div class="selected-footer">
              <div class="selected-export-actions" aria-label="選択済み一覧の画像出力操作">
                <button id="saveSelectedImageButton" class="selected-export-button" type="button">保存</button>
                <button id="copySelectedImageButton" class="selected-export-button" type="button">コピー</button>
                <button id="shareSelectedImageButton" class="selected-share-button" type="button" aria-label="選択済み一覧を共有" title="選択済み一覧を共有">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M15 8l-6 4 6 4"></path>
                    <path d="M6.5 12h8.25"></path>
                    <path d="M15.5 4.75a2.75 2.75 0 1 1 0 5.5 2.75 2.75 0 0 1 0-5.5Z"></path>
                    <path d="M15.5 13.75a2.75 2.75 0 1 1 0 5.5 2.75 2.75 0 0 1 0-5.5Z"></path>
                  </svg>
                  <span>共有</span>
                </button>
              </div>
              <button id="reviveAllButton" class="revive-all-button" type="button" disabled>全復活</button>
            </div>
          </section>
        </section>
      </div>

      <aside class="sidebar">
        <section class="panel genre-panel" aria-label="現在のジャンルと抽選設定">
          <div class="panel-title">
            <h2>現在のジャンル</h2>
            <span id="genreCount" class="count-badge" aria-label="表示中ジャンル数と全ジャンル数">0 / 0</span>
          </div>
          <div class="filter-actions" aria-label="ジャンルの一括表示設定と比率設定">
            <button id="showAllGenresButton" class="filter-action-button" type="button">すべて表示</button>
            <button id="hideAllGenresButton" class="filter-action-button" type="button">すべて非表示</button>
            <button id="ratioModeButton" class="filter-action-button ratio-mode-button desktop-ratio-mode-button" type="button" aria-pressed="true">比率 ON</button>
          </div>
          <ul id="genreList" class="genre-list"></ul>
          <button id="addGenreButton" class="add-genre-button" type="button">＋ ジャンルを追加</button>
          <div class="genre-management-actions">
            <div class="data-actions" aria-label="データのインポートとエクスポート">
              <button id="importButton" class="button-import" type="button">CSVインポート</button>
              <button id="exportButton" class="button-export" type="button">CSVエクスポート</button>
            </div>
            <button id="resetButton" class="button button-reset genre-reset-button" type="button">初期化</button>
          </div>
        </section>
      </aside>
    </div>

  </main>

  <div id="genreDrawerBackdrop" class="drawer-backdrop" aria-hidden="true"></div>

    <div class="drawer-header">
      <div class="drawer-title-group">
        <h2>現在のジャンル</h2>
        <span id="drawerGenreCount" class="count-badge" aria-label="表示中ジャンル数と全ジャンル数">0 / 0</span>
      </div>
      <button id="genreDrawerCloseButton" class="drawer-close-button" type="button" aria-label="ジャンル設定を閉じる" title="閉じる">×</button>
    </div>
    <div class="drawer-filter-actions" aria-label="ジャンルの一括表示設定">
      <button id="drawerShowAllGenresButton" class="filter-action-button" type="button">すべて表示</button>
      <button id="drawerHideAllGenresButton" class="filter-action-button" type="button">すべて非表示</button>
    </div>
    <ul id="drawerGenreList" class="genre-list drawer-genre-list"></ul>
    <button id="drawerAddGenreButton" class="add-genre-button" type="button">＋ ジャンルを追加</button>
    <div class="genre-management-actions">
      <div class="data-actions" aria-label="データのインポートとエクスポート">
        <button id="drawerImportButton" class="button-import" type="button">CSVインポート</button>
        <button id="drawerExportButton" class="button-export" type="button">CSVエクスポート</button>
      </div>
      <button id="drawerResetButton" class="button button-reset genre-reset-button" type="button">初期化</button>
    </div>
  </aside>

  <input id="csvFileInput" class="visually-hidden-file" type="file" accept=".csv,text/csv" />

  <script>
    const DEFAULT_GROUPS = [
      {
        genre: "",
        itemsText: "A案\nB案\nC案\nD案\nE案\nF案"
      }
    ];

    const NO_GENRE_KEY = "__no-genre__";
    const MIN_RATIO = 0.1;
    const STORAGE_KEY = "roulette-app-state";
    const STORAGE_VERSION = 1;

    // 回転速度はラジアン毎秒で管理します。
    // 初回クリックは以前より大幅に強くし、追加クリックも広い範囲で回転力が変化します。
    // 最大速度は約6.7回転/秒のまま維持し、描画負荷と操作性を両立します。
    const INITIAL_SPIN_IMPULSE_MIN = 22;
    const INITIAL_SPIN_IMPULSE_MAX = 36;
    const ADDITIONAL_SPIN_IMPULSE_MIN = 5.5;
    const ADDITIONAL_SPIN_IMPULSE_MAX = 16;
    const MAX_ANGULAR_VELOCITY = 42;
    const ANGULAR_VELOCITY_RETAINED_PER_SECOND = 0.5;
    const LOW_SPEED_FRICTION = 0.08;
    const STOP_ANGULAR_VELOCITY = 0.18;
    const MAX_FRAME_DELTA_SECONDS = 0.05;

    const COLORS = [
      "#5B5BD6",
      "#238A70",
      "#F08A5D",
      "#D65A7A",
      "#4C78A8",
      "#D4A72C",
      "#845EC2",
      "#2F8F9D",
      "#C45D3C",
      "#667085"
    ];

    const EYE_OPEN_ICON = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
        <circle cx="12" cy="12" r="2.7"></circle>
      </svg>`;

    const EYE_CLOSED_ICON = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 3l18 18"></path>
        <path d="M10.6 6.2A10.5 10.5 0 0 1 12 6c6 0 9.5 6 9.5 6a16 16 0 0 1-2.4 3.1"></path>
        <path d="M6.1 6.1C3.8 7.7 2.5 12 2.5 12s3.5 6 9.5 6a9.8 9.8 0 0 0 4.1-.9"></path>
        <path d="M10 10a2.8 2.8 0 0 0 4 4"></path>
      </svg>`;

    const SPEAKER_ON_ICON = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M11 5 6.8 8.5H3.5v7h3.3L11 19V5Z"></path>
        <path d="M15 9a4 4 0 0 1 0 6"></path>
        <path d="M17.8 6.7a7.5 7.5 0 0 1 0 10.6"></path>
      </svg>`;

    const SPEAKER_OFF_ICON = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M11 5 6.8 8.5H3.5v7h3.3L11 19V5Z"></path>
        <path d="m16 10 5 5"></path>
        <path d="m21 10-5 5"></path>
      </svg>`;

    const canvas = document.getElementById("wheelCanvas");
    const context = canvas.getContext("2d");
    const genreList = document.getElementById("genreList");
    const selectedGroupsContainer = document.getElementById("selectedGroups");
    const genreCount = document.getElementById("genreCount");
    const selectedCount = document.getElementById("selectedCount");
    const reviveAllButton = document.getElementById("reviveAllButton");
    const saveSelectedImageButton = document.getElementById("saveSelectedImageButton");
    const copySelectedImageButton = document.getElementById("copySelectedImageButton");
    const shareSelectedImageButton = document.getElementById("shareSelectedImageButton");
    const resultValue = document.getElementById("resultValue");
    const message = document.getElementById("message");
    const actionControls = document.getElementById("actionControls");
    const spinButton = document.getElementById("spinButton");
    const decisionButton = document.getElementById("decisionButton");
    const holdButton = document.getElementById("holdButton");
    const resetButton = document.getElementById("resetButton");
    const addGenreButton = document.getElementById("addGenreButton");
    const showAllGenresButton = document.getElementById("showAllGenresButton");
    const hideAllGenresButton = document.getElementById("hideAllGenresButton");
    const ratioModeButton = document.getElementById("ratioModeButton");
    const mobileRatioModeButton = document.getElementById("mobileRatioModeButton");
    const mobileSettingsButton = document.getElementById("mobileSettingsButton");
    const genreDrawer = document.getElementById("genreDrawer");
    const genreDrawerBackdrop = document.getElementById("genreDrawerBackdrop");
    const genreDrawerCloseButton = document.getElementById("genreDrawerCloseButton");
    const drawerGenreList = document.getElementById("drawerGenreList");
    const drawerGenreCount = document.getElementById("drawerGenreCount");
    const drawerShowAllGenresButton = document.getElementById("drawerShowAllGenresButton");
    const drawerHideAllGenresButton = document.getElementById("drawerHideAllGenresButton");
    const drawerAddGenreButton = document.getElementById("drawerAddGenreButton");
    const drawerResetButton = document.getElementById("drawerResetButton");
    const remainingCandidateCount = document.getElementById("remainingCandidateCount");
    const totalCandidateCount = document.getElementById("totalCandidateCount");
    const importButton = document.getElementById("importButton");
    const exportButton = document.getElementById("exportButton");
    const drawerImportButton = document.getElementById("drawerImportButton");
    const drawerExportButton = document.getElementById("drawerExportButton");
    const csvFileInput = document.getElementById("csvFileInput");
    const soundToggleButton = document.getElementById("soundToggleButton");

    const spinSound = new Audio("roulette-spin.wav");
    spinSound.preload = "auto";
    spinSound.loop = false;

    const resultSound = new Audio("roulette-result.wav");
    resultSound.preload = "auto";
    resultSound.loop = false;

    let groupSequence = 0;
    let inputGroups = createDefaultGroups();
    let filterSettings = new Map();
    const expandedGenreKeys = new Set();
    let genreEditor = null;
    let allCandidates = [];
    let candidates = [];
    let selectedItems = [];
    let currentResultIndex = null;
    let currentRotation = 0;
    let spinning = false;
    let ratioEnabled = true;
    let soundEnabled = true;
    let angularVelocity = 0;
    let spinAnimationFrameId = null;
    let lastSpinFrameTime = null;
    let saveStateTimerId = null;
    let storageWarningLogged = false;

    function createGroup(genre = "", itemsText = "") {
      groupSequence += 1;
      return {
        id: `group-${groupSequence}`,
        genre,
        itemsText
      };
    }

    function createDefaultGroups() {
      return DEFAULT_GROUPS.map((group) => createGroup(group.genre, group.itemsText));
    }

    function normalizeItems(text) {
      const unique = new Set();

      return text
        .split("\n")
        .map((item) => item.trim())
        .filter((item) => {
          if (!item || unique.has(item)) {
            return false;
          }
          unique.add(item);
          return true;
        });
    }

    function normalizeGenreName(value) {
      return String(value ?? "").trim();
    }

    function createStoredState() {
      return {
        version: STORAGE_VERSION,
        inputGroups: inputGroups.map((group) => ({
          genre: group.genre,
          itemsText: group.itemsText
        })),
        filterSettings: [...filterSettings.entries()].map(([filterKey, setting]) => [
          filterKey,
          {
            visible: setting.visible,
            ratio: setting.ratio
          }
        ]),
        selectedItems: selectedItems.map((candidate) => ({
          genre: candidate.genre,
          value: candidate.value,
          count: Math.max(1, Number(candidate.count) || 1),
          savedRatio: candidate.savedRatio,
          savedVisible: candidate.savedVisible
        })),
        ratioEnabled,
        soundEnabled
      };
    }

    function reportStorageError(error) {
      if (storageWarningLogged) {
        return;
      }
      storageWarningLogged = true;
      console.warn("ブラウザへの自動保存を利用できません。", error);
    }

    function saveAppState() {
      if (saveStateTimerId !== null) {
        window.clearTimeout(saveStateTimerId);
        saveStateTimerId = null;
      }

      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(createStoredState()));
      } catch (error) {
        reportStorageError(error);
      }
    }

    function scheduleAppStateSave() {
      if (saveStateTimerId !== null) {
        window.clearTimeout(saveStateTimerId);
      }
      saveStateTimerId = window.setTimeout(saveAppState, 200);
    }

    function restoreAppState() {
      try {
        const storedValue = localStorage.getItem(STORAGE_KEY);
        if (!storedValue) {
          return false;
        }

        const storedState = JSON.parse(storedValue);
        if (!storedState || storedState.version !== STORAGE_VERSION) {
          throw new Error("保存データのバージョンが一致しません。");
        }

        const restoredGroups = Array.isArray(storedState.inputGroups)
          ? storedState.inputGroups
              .filter((group) => group && typeof group === "object")
              .map((group) => createGroup(
                String(group.genre ?? ""),
                String(group.itemsText ?? "")
              ))
          : [];
        inputGroups = restoredGroups.length > 0 ? restoredGroups : createDefaultGroups();

        filterSettings = new Map();
        if (Array.isArray(storedState.filterSettings)) {
          storedState.filterSettings.forEach((entry) => {
            if (!Array.isArray(entry) || typeof entry[0] !== "string" || !entry[1]) {
              return;
            }
            const ratio = Number(entry[1].ratio);
            filterSettings.set(entry[0], {
              visible: entry[1].visible !== false,
              ratio: Number.isFinite(ratio) && ratio > 0 ? Math.max(MIN_RATIO, ratio) : 1
            });
          });
        }

        selectedItems = Array.isArray(storedState.selectedItems)
          ? storedState.selectedItems.flatMap((candidate) => {
              if (!candidate || typeof candidate !== "object") {
                return [];
              }
              const genre = normalizeGenreName(candidate.genre);
              const value = String(candidate.value ?? "").trim();
              if (!value) {
                return [];
              }
              const filterKey = getFilterKeyFromGenre(genre);
              const setting = filterSettings.get(filterKey) || { visible: true, ratio: 1 };
              const savedRatio = Number(candidate.savedRatio);
              return [{
                groupId: null,
                filterKey,
                genre,
                value,
                count: Math.max(1, Math.floor(Number(candidate.count) || 1)),
                savedRatio: Number.isFinite(savedRatio) && savedRatio > 0
                  ? Math.max(MIN_RATIO, savedRatio)
                  : setting.ratio,
                savedVisible: typeof candidate.savedVisible === "boolean"
                  ? candidate.savedVisible
                  : setting.visible
              }];
            })
          : [];

        ratioEnabled = storedState.ratioEnabled !== false;
        soundEnabled = storedState.soundEnabled !== false;
        return true;
      } catch (error) {
        reportStorageError(error);
        return false;
      }
    }

    function getFilterKeyFromGenre(genre) {
      const normalizedGenre = normalizeGenreName(genre);
      return normalizedGenre ? `genre:${normalizedGenre}` : NO_GENRE_KEY;
    }

    function getFilterKey(group) {
      return getFilterKeyFromGenre(group.genre);
    }

    function displayGenre(genre) {
      return genre || "ジャンルなし";
    }

    function getFilterSetting(filterKey) {
      if (!filterSettings.has(filterKey)) {
        filterSettings.set(filterKey, {
          visible: true,
          ratio: 1
        });
      }
      return filterSettings.get(filterKey);
    }

    function syncFilterSettings() {
      const activeKeys = new Set([
        ...allCandidates.map((candidate) => candidate.filterKey),
        ...selectedItems.map((candidate) => candidate.filterKey)
      ]);

      [...filterSettings.keys()].forEach((key) => {
        if (!activeKeys.has(key)) {
          filterSettings.delete(key);
        }
      });

      activeKeys.forEach((key) => getFilterSetting(key));
    }

    function buildCandidates() {
      const nextCandidates = [];

      inputGroups.forEach((group) => {
        const genre = group.genre.trim();
        const items = normalizeItems(group.itemsText);
        group.genre = genre;
        group.itemsText = items.join("\n");
        const filterKey = getFilterKeyFromGenre(genre);

        items.forEach((value) => {
          nextCandidates.push({
            groupId: group.id,
            filterKey,
            genre,
            value
          });
        });
      });

      return nextCandidates;
    }

    function getFilterGroups() {
      const filterGroups = [];
      const groupByKey = new Map();

      allCandidates.forEach((candidate) => {
        if (!groupByKey.has(candidate.filterKey)) {
          const filterGroup = {
            filterKey: candidate.filterKey,
            genre: candidate.genre,
            count: 0,
            values: [],
            groupIds: []
          };
          groupByKey.set(candidate.filterKey, filterGroup);
          filterGroups.push(filterGroup);
        }

        const filterGroup = groupByKey.get(candidate.filterKey);
        filterGroup.count += 1;
        filterGroup.values.push(candidate.value);
        if (!filterGroup.groupIds.includes(candidate.groupId)) {
          filterGroup.groupIds.push(candidate.groupId);
        }
      });

      return filterGroups;
    }

    function updateVisibleCandidates() {
      candidates = allCandidates.filter(
        (candidate) => getFilterSetting(candidate.filterKey).visible
      );
    }

    function formatResult(candidate) {
      return candidate.genre ? `${candidate.genre}：${candidate.value}` : candidate.value;
    }

    function getSelectedItemKey(candidate) {
      return `${normalizeGenreName(candidate.genre)}\u0000${String(candidate.value ?? "").trim()}`;
    }

    function findSelectedItem(candidate) {
      const key = getSelectedItemKey(candidate);
      return selectedItems.find((item) => getSelectedItemKey(item) === key) ?? null;
    }

    function getSelectedTotalCount() {
      return selectedItems.reduce(
        (total, item) => total + Math.max(1, Number(item.count) || 1),
        0
      );
    }

    function isCandidateGenreVisible(candidate) {
      return getFilterSetting(candidate.filterKey).visible;
    }

    function getVisibleOverallUniqueCandidateCount() {
      const uniqueCandidates = new Set();

      allCandidates.forEach((candidate) => {
        if (isCandidateGenreVisible(candidate)) {
          uniqueCandidates.add(getSelectedItemKey(candidate));
        }
      });
      selectedItems.forEach((candidate) => {
        if (isCandidateGenreVisible(candidate)) {
          uniqueCandidates.add(getSelectedItemKey(candidate));
        }
      });

      return uniqueCandidates.size;
    }

    function renderCandidateSummary() {
      const visibleRemainingCount = allCandidates.filter(isCandidateGenreVisible).length;
      remainingCandidateCount.textContent = String(visibleRemainingCount);
      totalCandidateCount.textContent = String(getVisibleOverallUniqueCandidateCount());
    }

    function getSelectedUniqueCount() {
      return selectedItems.length;
    }

    function formatExportDate(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");
      return `${year}/${month}/${day} ${hours}:${minutes}`;
    }

    function createSelectedImageFileName(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");
      const seconds = String(date.getSeconds()).padStart(2, "0");
      return `selected-items-${year}${month}${day}-${hours}${minutes}${seconds}.png`;
    }

    function wrapCanvasText(ctx, text, maxWidth) {
      const value = String(text ?? "");
      const lines = [];
      let currentLine = "";

      for (const character of value) {
        const nextLine = currentLine + character;
        if (currentLine && ctx.measureText(nextLine).width > maxWidth) {
          lines.push(currentLine);
          currentLine = character;
        } else {
          currentLine = nextLine;
        }
      }

      if (currentLine || lines.length === 0) {
        lines.push(currentLine || "");
      }

      return lines;
    }

    async function generateSelectedItemsImageBlob() {
      if (selectedItems.length === 0) {
        throw new Error("選択済み候補がありません");
      }

      const snapshotDate = new Date();
      const totalSelectedCount = getSelectedTotalCount();
      const uniqueSelectedCount = getSelectedUniqueCount();
      const groupedEntries = [...aggregateByGenre(selectedItems).entries()].map(([genre, values]) => ({
        genre,
        values
      }));

      const width = 1080;
      const paddingX = 72;
      const paddingTop = 72;
      const paddingBottom = 72;
      const contentWidth = width - paddingX * 2;
      const titleFont = "700 42px sans-serif";
      const metaFont = "500 24px sans-serif";
      const sectionFont = "700 30px sans-serif";
      const itemFont = "500 26px sans-serif";
      const lineHeightMeta = 36;
      const lineHeightItem = 38;
      const accentColor = "#1f6f50";
      const textColor = "#173a2f";
      const subtleColor = "#5f716a";

      const measureCanvas = document.createElement("canvas");
      const measureContext = measureCanvas.getContext("2d");
      const operations = [];
      let y = paddingTop;

      function addTextBlock(text, options = {}) {
        const {
          font = itemFont,
          color = textColor,
          x = paddingX,
          maxWidth = contentWidth,
          lineHeight = lineHeightItem,
          align = "left",
          topMargin = 0
        } = options;

        measureContext.font = font;
        const lines = wrapCanvasText(measureContext, text, maxWidth);
        y += topMargin;
        operations.push({ type: "text", lines, font, color, x, y, lineHeight, align });
        y += lines.length * lineHeight;
      }

      function addDivider(topMargin = 24, bottomMargin = 24) {
        y += topMargin;
        operations.push({ type: "divider", y });
        y += bottomMargin;
      }

      addTextBlock("選択済み一覧", {
        font: titleFont,
        color: accentColor,
        align: "center",
        x: width / 2,
        maxWidth: contentWidth,
        lineHeight: 52
      });
      addTextBlock(`日付：${formatExportDate(snapshotDate)}`, {
        font: metaFont,
        color: subtleColor,
        align: "center",
        x: width / 2,
        maxWidth: contentWidth,
        lineHeight: lineHeightMeta,
        topMargin: 10
      });
      addTextBlock(`全候補数：${totalSelectedCount} / ${uniqueSelectedCount}`, {
        font: metaFont,
        color: subtleColor,
        align: "center",
        x: width / 2,
        maxWidth: contentWidth,
        lineHeight: lineHeightMeta,
        topMargin: 4
      });

      addDivider(24, 28);

      groupedEntries.forEach((group, groupIndex) => {
        if (groupIndex > 0) {
          addDivider(20, 24);
        }

        addTextBlock(displayGenre(group.genre), {
          font: sectionFont,
          color: accentColor,
          lineHeight: 42
        });

        group.values.forEach((candidate) => {
          const selectionCount = Math.max(1, Number(candidate.count) || 1);
          const candidateLabel = selectionCount > 1
            ? `・${candidate.value}（${selectionCount}回）`
            : `・${candidate.value}`;
          addTextBlock(candidateLabel, {
            font: itemFont,
            color: textColor,
            x: paddingX + 10,
            maxWidth: contentWidth - 10,
            lineHeight: lineHeightItem,
            topMargin: 10
          });
        });
      });

      const height = Math.max(640, Math.ceil(y + paddingBottom));
      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = width;
      exportCanvas.height = height;
      const exportContext = exportCanvas.getContext("2d");

      exportContext.fillStyle = "#f6fbf8";
      exportContext.fillRect(0, 0, width, height);
      exportContext.fillStyle = "#ffffff";
      exportContext.fillRect(28, 28, width - 56, height - 56);
      exportContext.fillStyle = accentColor;
      exportContext.fillRect(28, 28, width - 56, 14);

      operations.forEach((operation) => {
        if (operation.type === "divider") {
          exportContext.strokeStyle = "#d8ebe2";
          exportContext.lineWidth = 2;
          exportContext.beginPath();
          exportContext.moveTo(paddingX, operation.y);
          exportContext.lineTo(width - paddingX, operation.y);
          exportContext.stroke();
          return;
        }

        exportContext.font = operation.font;
        exportContext.fillStyle = operation.color;
        exportContext.textAlign = operation.align;
        exportContext.textBaseline = "top";

        operation.lines.forEach((line, index) => {
          exportContext.fillText(line, operation.x, operation.y + index * operation.lineHeight);
        });
      });

      const blob = await new Promise((resolve) => exportCanvas.toBlob(resolve, "image/png"));
      if (!blob) {
        throw new Error("画像の生成に失敗しました");
      }

      return {
        blob,
        fileName: createSelectedImageFileName(snapshotDate)
      };
    }

    function downloadSelectedItemsImage(blob, fileName) {
      const objectUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = objectUrl;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
    }

    async function saveSelectedItemsImage() {
      try {
        const { blob, fileName } = await generateSelectedItemsImageBlob();
        downloadSelectedItemsImage(blob, fileName);
        setMessage("選択済み一覧の画像を保存しました。", "success");
      } catch (error) {
        setMessage(error?.message || "画像の保存に失敗しました。", "error");
      }
    }

    async function copySelectedItemsImage() {
      try {
        const { blob, fileName } = await generateSelectedItemsImageBlob();

        if (window.ClipboardItem && navigator.clipboard?.write) {
          await navigator.clipboard.write([
            new ClipboardItem({ [blob.type]: blob })
          ]);
          setMessage("選択済み一覧の画像をコピーしました。", "success");
          return;
        }

        downloadSelectedItemsImage(blob, fileName);
        setMessage("画像コピーに対応していないため、画像を保存しました。", "success");
      } catch (error) {
        if (error?.name === "AbortError") {
          return;
        }
        setMessage(error?.message || "画像のコピーに失敗しました。", "error");
      }
    }

    async function shareSelectedItemsImage() {
      try {
        const { blob, fileName } = await generateSelectedItemsImageBlob();
        const file = new File([blob], fileName, { type: blob.type || "image/png" });

        if (navigator.share && (!navigator.canShare || navigator.canShare({ files: [file] }))) {
          await navigator.share({
            title: "選択済み一覧",
            text: "選択済み一覧を共有します。",
            files: [file]
          });
          setMessage("選択済み一覧の画像を共有しました。", "success");
          return;
        }

        downloadSelectedItemsImage(blob, fileName);
        setMessage("共有に対応していないため、画像を保存しました。", "success");
      } catch (error) {
        if (error?.name === "AbortError") {
          return;
        }
        setMessage(error?.message || "画像の共有に失敗しました。", "error");
      }
    }

    function addSelectedItem(candidate, count = 1) {
      const increment = Math.max(1, Math.floor(Number(count) || 1));
      const existing = findSelectedItem(candidate);

      if (existing) {
        existing.count = Math.max(1, Number(existing.count) || 1) + increment;
        return existing;
      }

      const setting = getFilterSetting(candidate.filterKey);
      const selectedItem = {
        ...candidate,
        count: increment,
        savedRatio: setting.ratio,
        savedVisible: setting.visible
      };
      selectedItems.push(selectedItem);
      return selectedItem;
    }

    function setMessage(text = "", type = "") {
      message.textContent = text;
      message.className = type ? `message ${type}` : "message";
    }

    function renderActionButtons() {
      const waitingForDecision = !spinning && currentResultIndex !== null;

      spinButton.hidden = waitingForDecision;
      decisionButton.hidden = !waitingForDecision;
      holdButton.hidden = !waitingForDecision;

      // 回転中もボタンを押せる状態にし、追加クリックを回転力として加算します。
      spinButton.disabled = candidates.length === 0 || currentResultIndex !== null || genreEditor !== null;
      spinButton.textContent = spinning ? "さらに回す" : "ルーレットを回す";
      spinButton.setAttribute(
        "aria-label",
        spinning ? "ルーレットへ回転力を追加する" : "ルーレットを回す"
      );
      spinButton.title = spinning ? "押すたびに回転速度が上がります" : "ルーレットを回します";

      decisionButton.disabled = !waitingForDecision;
      holdButton.disabled = !waitingForDecision;

      actionControls.classList.toggle("is-spin-state", !waitingForDecision);
      actionControls.classList.toggle("is-result-state", waitingForDecision);
    }

    function resetResult() {
      currentResultIndex = null;
      resultValue.textContent = "まだ選択されていません";
      renderActionButtons();
    }

    function isFilterLocked() {
      return spinning || currentResultIndex !== null;
    }

    function aggregateByGenre(values) {
      const groups = new Map();

      values.forEach((candidate) => {
        const key = candidate.genre;
        if (!groups.has(key)) {
          groups.set(key, []);
        }
        groups.get(key).push(candidate);
      });

      return groups;
    }

    function formatRatio(value) {
      return Number(value.toFixed(2)).toString();
    }

    function createGenreEditAction(action, text, label, className = "") {
      const button = document.createElement("button");
      button.className = `genre-edit-button ${className}`.trim();
      button.type = "button";
      button.dataset.action = action;
      button.textContent = text;
      button.setAttribute("aria-label", label);
      button.title = label;
      return button;
    }

        : "list-item genre-editor-card is-hidden";
