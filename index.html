<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ジャンルフィルター付きルーレット v3</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: rgba(255, 255, 255, 0.92);
      --text: #202431;
      --muted: #6d7485;
      --line: #dfe4ee;
      --primary: #5b5bd6;
      --primary-dark: #4747b8;
      --danger: #d9534f;
      --success: #25875f;
      --shadow: 0 18px 48px rgba(41, 49, 75, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(91, 91, 214, 0.13), transparent 34%),
        radial-gradient(circle at bottom right, rgba(37, 135, 95, 0.10), transparent 32%),
        var(--bg);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled,
    input:disabled,
    textarea:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    .page {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: 0.02em;
    }

    .version-note {
      display: inline-flex;
      margin: 0 0 10px;
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--primary-dark);
      background: rgba(91, 91, 214, 0.10);
      font-size: 12px;
      font-weight: 800;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(390px, 440px);
      gap: 24px;
      align-items: start;
    }

    .panel {
      border: 1px solid rgba(223, 228, 238, 0.9);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .roulette-panel {
      padding: 28px;
    }

    .wheel-area {
      position: relative;
      width: min(560px, 100%);
      margin: 0 auto;
      padding-top: 8px;
    }

    .pointer {
      position: absolute;
      z-index: 5;
      top: 0;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 38px solid #242735;
      filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.2));
    }

    .canvas-wrap {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      padding: 10px;
      background: linear-gradient(145deg, #ffffff, #dfe4ee);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.8),
        0 18px 34px rgba(31, 37, 55, 0.18);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .result-card {
      margin-top: 24px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
      text-align: center;
    }

    .result-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .result-value {
      min-height: 48px;
      margin-top: 6px;
      display: grid;
      place-items: center;
      font-size: clamp(24px, 5vw, 38px);
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .button {
      min-height: 52px;
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      font-weight: 800;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .button:not(:disabled):hover {
      transform: translateY(-2px);
    }

    .button-primary {
      color: #ffffff;
      background: var(--primary);
      box-shadow: 0 10px 20px rgba(91, 91, 214, 0.28);
    }

    .button-primary:not(:disabled):hover {
      background: var(--primary-dark);
    }

    .button-decision {
      color: #ffffff;
      background: var(--success);
    }

    .button-hold {
      color: #4f5668;
      background: #edf0f5;
      border: 1px solid #d9deea;
    }

    .sidebar {
      display: grid;
      gap: 18px;
    }

    .settings-panel,
    .genre-panel {
      padding: 22px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .count-badge {
      min-width: 58px;
      height: 28px;
      padding: 0 9px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #ffffff;
      background: var(--primary);
      font-size: 13px;
      font-weight: 800;
    }

    .input-groups {
      display: grid;
      gap: 14px;
    }

    .input-group {
      display: grid;
      grid-template-columns: 38px minmax(110px, 0.72fr) minmax(180px, 1.45fr);
      gap: 10px;
      align-items: stretch;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(247, 248, 252, 0.82);
    }

    .group-controls {
      display: grid;
      align-content: start;
      gap: 7px;
      padding-top: 25px;
    }

    .group-icon-button {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      color: var(--primary);
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .group-icon-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: rgba(91, 91, 214, 0.5);
      background: #f4f3ff;
    }

    .group-icon-button.remove {
      color: var(--danger);
    }

    .group-icon-button.remove:not(:disabled):hover {
      border-color: #efc2bf;
      background: #fff5f4;
    }

    .field {
      min-width: 0;
    }

    .field label {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 20px;
      margin-bottom: 5px;
      font-size: 12px;
      font-weight: 800;
      color: #4f5668;
    }

    .optional {
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      color: var(--text);
      background: #ffffff;
      outline: none;
    }

    input[type="text"] {
      min-height: 44px;
    }

    textarea {
      min-height: 128px;
      resize: vertical;
      line-height: 1.6;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(91, 91, 214, 0.12);
    }

    .helper {
      margin: 10px 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .settings-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .button-apply {
      color: #ffffff;
      background: #343847;
    }

    .button-reset {
      color: var(--danger);
      background: #fff5f4;
      border: 1px solid #f3cfcd;
    }

    .filter-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .filter-action-button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      color: #4f5668;
      background: #ffffff;
      font-size: 12px;
      font-weight: 800;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .filter-action-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: rgba(91, 91, 214, 0.48);
      background: #f4f3ff;
    }

    .genre-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 9px;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
    }

    .item-number {
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--primary);
      background: rgba(91, 91, 214, 0.11);
      font-size: 12px;
      font-weight: 800;
    }

    .item-text {
      min-width: 0;
      flex: 1;
      overflow-wrap: anywhere;
      line-height: 1.45;
    }

    .list-item.is-hidden {
      border-color: #e5e8ef;
      background: #f4f5f8;
    }

    .list-item.is-hidden .item-number,
    .list-item.is-hidden .item-text {
      opacity: 0.5;
    }

    .visibility-button {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--primary);
      background: #ffffff;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .visibility-button svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .visibility-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: rgba(91, 91, 214, 0.52);
      background: #f4f3ff;
    }

    .visibility-button.is-hidden {
      color: #8b92a3;
      background: #eceef3;
    }

    .selected-section {
      margin-top: 24px;
      padding: 24px;
    }

    .selected-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .selected-header h2 {
      margin: 0;
      font-size: 22px;
    }

    .selected-groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }

    .selected-group {
      min-width: 0;
      padding: 16px 17px;
      border: 1px solid #cfe6dc;
      border-radius: 15px;
      background: #f5fbf8;
    }

    .selected-group h3 {
      margin: 0 0 10px;
      padding-bottom: 9px;
      border-bottom: 1px solid #d8ebe2;
      color: #1f6f50;
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .selected-candidates {
      margin: 0;
      padding-left: 21px;
      display: grid;
      gap: 7px;
    }

    .selected-candidates li {
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 28px;
      border: 1px dashed #cbd1dd;
      border-radius: 14px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.64);
    }

    .message {
      min-height: 24px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--success);
    }

    @media (max-width: 980px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .sidebar {
        grid-template-columns: minmax(0, 1.4fr) minmax(260px, 0.8fr);
      }
    }

    @media (max-width: 720px) {
      .sidebar {
        grid-template-columns: 1fr;
      }

      .input-group {
        grid-template-columns: 38px 1fr;
      }

      .group-controls {
        grid-row: 1 / 3;
      }

      .genre-field,
      .candidates-field {
        grid-column: 2;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1240px);
        padding-top: 24px;
      }

      .roulette-panel,
      .settings-panel,
      .genre-panel,
      .selected-section {
        padding: 18px;
        border-radius: 18px;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .button-primary {
        grid-column: 1 / -1;
      }

      .settings-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>ルーレット</h1>
      <div class="version-note">ジャンルフィルター対応版</div>
      <p>ジャンルごとに候補を登録し、「現在のジャンル」欄からルーレットに含めるグループを複数選択できます。</p>
    </header>

    <div class="main-grid">
      <section class="panel roulette-panel" aria-label="ルーレット">
        <div class="wheel-area">
          <div class="pointer" aria-hidden="true"></div>
          <div class="canvas-wrap">
            <canvas id="wheelCanvas" width="900" height="900"></canvas>
          </div>
        </div>

        <div class="result-card" aria-live="polite">
          <div class="result-label">選択結果</div>
          <div id="resultValue" class="result-value">まだ選択されていません</div>
        </div>

        <div class="controls">
          <button id="spinButton" class="button button-primary" type="button">ルーレットを回す</button>
          <button id="decisionButton" class="button button-decision" type="button" disabled>決定</button>
          <button id="holdButton" class="button button-hold" type="button" disabled>保留</button>
        </div>
        <div id="message" class="message" aria-live="polite"></div>
      </section>

      <aside class="sidebar">
        <section class="panel settings-panel">
          <div class="panel-title">
            <h2>候補を編集</h2>
          </div>
          <div id="inputGroups" class="input-groups"></div>
          <p class="helper">ジャンルは任意です。候補は1行につき1件入力してください。「＋」で入力欄を追加し、「－」で削除できます。</p>
          <div class="settings-actions">
            <button id="applyButton" class="button button-apply" type="button">候補を反映</button>
            <button id="resetButton" class="button button-reset" type="button">初期化</button>
          </div>
        </section>

        <section class="panel genre-panel">
          <div class="panel-title">
            <h2>現在のジャンル</h2>
            <span id="genreCount" class="count-badge" aria-label="表示中ジャンル数と全ジャンル数">0 / 0</span>
          </div>
          <div class="filter-actions" aria-label="ジャンルの一括表示設定">
            <button id="showAllGenresButton" class="filter-action-button" type="button">すべて表示</button>
            <button id="hideAllGenresButton" class="filter-action-button" type="button">すべて非表示</button>
          </div>
          <ul id="genreList" class="genre-list"></ul>
        </section>
      </aside>
    </div>

    <section class="panel selected-section">
      <div class="selected-header">
        <h2>選択済み</h2>
        <span id="selectedCount" class="count-badge" aria-label="選択済み候補数">0</span>
      </div>
      <div id="selectedGroups" class="selected-groups"></div>
    </section>
  </main>

  <script>
    const DEFAULT_GROUPS = [
      {
        genre: "",
        itemsText: "A案\nB案\nC案\nD案\nE案\nF案"
      }
    ];

    const COLORS = [
      "#5B5BD6",
      "#238A70",
      "#F08A5D",
      "#D65A7A",
      "#4C78A8",
      "#D4A72C",
      "#845EC2",
      "#2F8F9D",
      "#C45D3C",
      "#667085"
    ];

    const EYE_OPEN_ICON = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
        <circle cx="12" cy="12" r="2.7"></circle>
      </svg>`;

    const EYE_CLOSED_ICON = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 3l18 18"></path>
        <path d="M10.6 6.2A10.5 10.5 0 0 1 12 6c6 0 9.5 6 9.5 6a16 16 0 0 1-2.4 3.1"></path>
        <path d="M6.1 6.1C3.8 7.7 2.5 12 2.5 12s3.5 6 9.5 6a9.8 9.8 0 0 0 4.1-.9"></path>
        <path d="M10 10a2.8 2.8 0 0 0 4 4"></path>
      </svg>`;

    const canvas = document.getElementById("wheelCanvas");
    const context = canvas.getContext("2d");
    const inputGroupsContainer = document.getElementById("inputGroups");
    const genreList = document.getElementById("genreList");
    const selectedGroupsContainer = document.getElementById("selectedGroups");
    const genreCount = document.getElementById("genreCount");
    const selectedCount = document.getElementById("selectedCount");
    const resultValue = document.getElementById("resultValue");
    const message = document.getElementById("message");
    const spinButton = document.getElementById("spinButton");
    const decisionButton = document.getElementById("decisionButton");
    const holdButton = document.getElementById("holdButton");
    const applyButton = document.getElementById("applyButton");
    const resetButton = document.getElementById("resetButton");
    const showAllGenresButton = document.getElementById("showAllGenresButton");
    const hideAllGenresButton = document.getElementById("hideAllGenresButton");

    let groupSequence = 0;
    let inputGroups = createDefaultGroups();
    let allCandidates = [];
    let candidates = [];
    let selectedItems = [];
    let currentResultIndex = null;
    let currentRotation = 0;
    let spinning = false;

    function createGroup(genre = "", itemsText = "", visible = true) {
      groupSequence += 1;
      return {
        id: `group-${groupSequence}`,
        genre,
        itemsText,
        visible
      };
    }

    function createDefaultGroups() {
      return DEFAULT_GROUPS.map((group) => createGroup(group.genre, group.itemsText, true));
    }

    function normalizeItems(text) {
      const unique = new Set();

      return text
        .split("\n")
        .map((item) => item.trim())
        .filter((item) => {
          if (!item || unique.has(item)) {
            return false;
          }
          unique.add(item);
          return true;
        });
    }

    function buildCandidates() {
      const nextCandidates = [];

      inputGroups.forEach((group) => {
        const genre = group.genre.trim();
        const items = normalizeItems(group.itemsText);
        group.genre = genre;
        group.itemsText = items.join("\n");

        items.forEach((value) => {
          nextCandidates.push({
            groupId: group.id,
            genre,
            value
          });
        });
      });

      return nextCandidates;
    }

    function updateVisibleCandidates() {
      const visibilityByGroup = new Map(
        inputGroups.map((group) => [group.id, group.visible])
      );

      candidates = allCandidates.filter(
        (candidate) => visibilityByGroup.get(candidate.groupId) === true
      );
    }

    function formatResult(candidate) {
      return candidate.genre ? `${candidate.genre}：${candidate.value}` : candidate.value;
    }

    function displayGenre(genre) {
      return genre || "ジャンルなし";
    }

    function setMessage(text = "", type = "") {
      message.textContent = text;
      message.className = type ? `message ${type}` : "message";
    }

    function resetResult() {
      currentResultIndex = null;
      resultValue.textContent = "まだ選択されていません";
      decisionButton.disabled = true;
      holdButton.disabled = true;
    }

    function isFilterLocked() {
      return spinning || currentResultIndex !== null;
    }

    function setInputControlsDisabled(disabled) {
      inputGroupsContainer
        .querySelectorAll("input, textarea, button")
        .forEach((element) => {
          element.disabled = disabled || (element.classList.contains("remove") && inputGroups.length === 1);
        });
    }

    function renderInputGroups() {
      inputGroupsContainer.innerHTML = "";

      inputGroups.forEach((group, index) => {
        const wrapper = document.createElement("div");
        wrapper.className = "input-group";
        wrapper.dataset.groupId = group.id;

        const controls = document.createElement("div");
        controls.className = "group-controls";

        const addButton = document.createElement("button");
        addButton.className = "group-icon-button add";
        addButton.type = "button";
        addButton.textContent = "+";
        addButton.dataset.action = "add";
        addButton.setAttribute("aria-label", `${index + 1}番目の下に入力グループを追加`);
        addButton.title = "この下に入力欄を追加";

        const removeButton = document.createElement("button");
        removeButton.className = "group-icon-button remove";
        removeButton.type = "button";
        removeButton.textContent = "−";
        removeButton.dataset.action = "remove";
        removeButton.disabled = inputGroups.length === 1;
        removeButton.setAttribute("aria-label", `${index + 1}番目の入力グループを削除`);
        removeButton.title = inputGroups.length === 1 ? "入力欄は1つ以上必要です" : "この入力欄を削除";

        controls.append(addButton, removeButton);

        const genreField = document.createElement("div");
        genreField.className = "field genre-field";

        const genreLabel = document.createElement("label");
        genreLabel.htmlFor = `genre-${group.id}`;
        genreLabel.innerHTML = `ジャンル <span class="optional">任意</span>`;

        const genreInput = document.createElement("input");
        genreInput.id = `genre-${group.id}`;
        genreInput.type = "text";
        genreInput.value = group.genre;
        genreInput.placeholder = "例：食べ物";
        genreInput.dataset.field = "genre";
        genreInput.autocomplete = "off";

        genreField.append(genreLabel, genreInput);

        const candidatesField = document.createElement("div");
        candidatesField.className = "field candidates-field";

        const candidatesLabel = document.createElement("label");
        candidatesLabel.htmlFor = `items-${group.id}`;
        candidatesLabel.textContent = "候補";

        const candidatesInput = document.createElement("textarea");
        candidatesInput.id = `items-${group.id}`;
        candidatesInput.value = group.itemsText;
        candidatesInput.placeholder = "寿司\nカレー\nラーメン";
        candidatesInput.dataset.field = "itemsText";
        candidatesInput.setAttribute("aria-label", `${index + 1}番目の候補`);

        candidatesField.append(candidatesLabel, candidatesInput);
        wrapper.append(controls, genreField, candidatesField);
        inputGroupsContainer.appendChild(wrapper);
      });

      setInputControlsDisabled(spinning);
    }

    function aggregateByGenre(values) {
      const groups = new Map();

      values.forEach((candidate) => {
        const key = candidate.genre;
        if (!groups.has(key)) {
          groups.set(key, []);
        }
        groups.get(key).push(candidate);
      });

      return groups;
    }

    function renderGenres() {
      genreList.innerHTML = "";
      const countsByGroup = new Map();

      allCandidates.forEach((candidate) => {
        countsByGroup.set(candidate.groupId, (countsByGroup.get(candidate.groupId) || 0) + 1);
      });

      const groupsWithCandidates = inputGroups.filter(
        (group) => (countsByGroup.get(group.id) || 0) > 0
      );
      const visibleGroupCount = groupsWithCandidates.filter((group) => group.visible).length;
      const totalGroupCount = groupsWithCandidates.length;
      const locked = isFilterLocked();

      genreCount.textContent = `${visibleGroupCount} / ${totalGroupCount}`;
      showAllGenresButton.disabled = locked || totalGroupCount === 0 || visibleGroupCount === totalGroupCount;
      hideAllGenresButton.disabled = locked || totalGroupCount === 0 || visibleGroupCount === 0;

      if (totalGroupCount === 0) {
        const empty = document.createElement("li");
        empty.className = "empty-state";
        empty.textContent = "ジャンルがありません";
        genreList.appendChild(empty);
        return;
      }

      groupsWithCandidates.forEach((group, index) => {
        const item = document.createElement("li");
        item.className = group.visible ? "list-item" : "list-item is-hidden";
        item.dataset.groupId = group.id;

        const number = document.createElement("span");
        number.className = "item-number";
        number.textContent = index + 1;

        const text = document.createElement("span");
        text.className = "item-text";
        text.textContent = `${displayGenre(group.genre)}（${countsByGroup.get(group.id)}件）`;

        const visibilityButton = document.createElement("button");
        visibilityButton.className = group.visible
          ? "visibility-button"
          : "visibility-button is-hidden";
        visibilityButton.type = "button";
        visibilityButton.dataset.action = "toggle-visibility";
        visibilityButton.disabled = locked;
        visibilityButton.innerHTML = group.visible ? EYE_OPEN_ICON : EYE_CLOSED_ICON;
        visibilityButton.setAttribute(
          "aria-label",
          `${displayGenre(group.genre)}を${group.visible ? "非表示" : "表示"}にする`
        );
        visibilityButton.title = group.visible ? "ルーレットから非表示にする" : "ルーレットに表示する";

        item.append(number, text, visibilityButton);
        genreList.appendChild(item);
      });
    }

    function renderSelectedItems() {
      selectedGroupsContainer.innerHTML = "";
      selectedCount.textContent = selectedItems.length;

      if (selectedItems.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "決定した項目がここに表示されます";
        selectedGroupsContainer.appendChild(empty);
        return;
      }

      const genreGroups = aggregateByGenre(selectedItems);

      genreGroups.forEach((values, genre) => {
        const section = document.createElement("section");
        section.className = "selected-group";

        const title = document.createElement("h3");
        title.textContent = displayGenre(genre);

        const list = document.createElement("ul");
        list.className = "selected-candidates";

        values.forEach((candidate) => {
          const item = document.createElement("li");
          item.textContent = candidate.value;
          list.appendChild(item);
        });

        section.append(title, list);
        selectedGroupsContainer.appendChild(section);
      });
    }

    function renderState() {
      renderGenres();
      renderSelectedItems();
      spinButton.disabled = spinning || candidates.length === 0 || currentResultIndex !== null;
    }

    function fitText(text, maxWidth, baseSize) {
      let size = baseSize;
      context.font = `700 ${size}px sans-serif`;

      while (context.measureText(text).width > maxWidth && size > 18) {
        size -= 1;
        context.font = `700 ${size}px sans-serif`;
      }

      return size;
    }

    function drawWheel(rotation = currentRotation) {
      const width = canvas.width;
      const height = canvas.height;
      const centerX = width / 2;
      const centerY = height / 2;
      const radius = Math.min(width, height) / 2 - 16;

      context.clearRect(0, 0, width, height);
      context.save();
      context.translate(centerX, centerY);
      context.rotate(rotation);

      if (candidates.length === 0) {
        context.beginPath();
        context.arc(0, 0, radius, 0, Math.PI * 2);
        context.fillStyle = "#e7eaf0";
        context.fill();
        context.fillStyle = "#6d7485";
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.font = "700 31px sans-serif";
        context.fillText(
          allCandidates.length === 0 ? "候補がありません" : "表示中の候補がありません",
          0,
          0
        );
        context.restore();
        return;
      }

      const arc = (Math.PI * 2) / candidates.length;

      candidates.forEach((candidate, index) => {
        const startAngle = index * arc - Math.PI / 2;
        const endAngle = startAngle + arc;

        context.beginPath();
        context.moveTo(0, 0);
        context.arc(0, 0, radius, startAngle, endAngle);
        context.closePath();
        context.fillStyle = COLORS[index % COLORS.length];
        context.fill();

        context.strokeStyle = "rgba(255, 255, 255, 0.82)";
        context.lineWidth = 5;
        context.stroke();

        context.save();
        context.rotate(startAngle + arc / 2);
        context.translate(radius * 0.63, 0);
        context.rotate(Math.PI / 2);
        context.fillStyle = "#ffffff";
        context.textAlign = "center";
        context.textBaseline = "middle";
        const maxTextWidth = Math.max(110, arc * radius * 0.78);
        const fontSize = fitText(candidate.value, maxTextWidth, candidates.length > 12 ? 24 : 31);
        context.font = `700 ${fontSize}px sans-serif`;
        context.shadowColor = "rgba(0, 0, 0, 0.25)";
        context.shadowBlur = 5;
        context.fillText(candidate.value, 0, 0, maxTextWidth);
        context.restore();
      });

      context.beginPath();
      context.arc(0, 0, radius * 0.12, 0, Math.PI * 2);
      context.fillStyle = "#ffffff";
      context.fill();
      context.lineWidth = 10;
      context.strokeStyle = "rgba(32, 36, 49, 0.15)";
      context.stroke();

      context.restore();
    }

    function easeOutCubic(value) {
      return 1 - Math.pow(1 - value, 3);
    }

    function spinRoulette() {
      if (spinning || candidates.length === 0 || currentResultIndex !== null) {
        return;
      }

      spinning = true;
      resetResult();
      setMessage("抽選中です…");
      spinButton.disabled = true;
      applyButton.disabled = true;
      resetButton.disabled = true;
      setInputControlsDisabled(true);
      renderGenres();

      const chosenIndex = Math.floor(Math.random() * candidates.length);
      const arc = (Math.PI * 2) / candidates.length;
      const targetCenter = chosenIndex * arc + arc / 2;
      const baseTurns = (6 + Math.floor(Math.random() * 3)) * Math.PI * 2;
      const currentNormalized = ((currentRotation % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const targetNormalized = (Math.PI * 2 - targetCenter) % (Math.PI * 2);
      const adjustment = (targetNormalized - currentNormalized + Math.PI * 2) % (Math.PI * 2);
      const targetRotation = currentRotation + baseTurns + adjustment;
      const startRotation = currentRotation;
      const duration = 4200;
      const startTime = performance.now();

      function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = easeOutCubic(progress);
        currentRotation = startRotation + (targetRotation - startRotation) * eased;
        drawWheel(currentRotation);

        if (progress < 1) {
          requestAnimationFrame(animate);
          return;
        }

        currentRotation = targetRotation;
        currentResultIndex = chosenIndex;
        resultValue.textContent = formatResult(candidates[chosenIndex]);
        decisionButton.disabled = false;
        holdButton.disabled = false;
        spinning = false;
        applyButton.disabled = false;
        resetButton.disabled = false;
        setInputControlsDisabled(false);
        renderGenres();
        setMessage("「決定」または「保留」を選んでください。");
      }

      requestAnimationFrame(animate);
    }

    function removeCandidateFromInput(candidate) {
      const group = inputGroups.find((item) => item.id === candidate.groupId);
      if (!group) {
        return;
      }

      const values = normalizeItems(group.itemsText);
      const removeIndex = values.indexOf(candidate.value);
      if (removeIndex !== -1) {
        values.splice(removeIndex, 1);
      }
      group.itemsText = values.join("\n");
    }

    function decideResult() {
      if (currentResultIndex === null || !candidates[currentResultIndex]) {
        return;
      }

      const decided = candidates[currentResultIndex];
      const allCandidateIndex = allCandidates.indexOf(decided);
      if (allCandidateIndex !== -1) {
        allCandidates.splice(allCandidateIndex, 1);
      }

      selectedItems.push(decided);
      removeCandidateFromInput(decided);
      updateVisibleCandidates();
      currentRotation = 0;
      resetResult();
      renderInputGroups();
      renderState();
      drawWheel(0);
      setMessage(`「${formatResult(decided)}」を選択済みに移動しました。`, "success");
    }

    function holdResult() {
      if (currentResultIndex === null || !candidates[currentResultIndex]) {
        return;
      }

      const heldItem = candidates[currentResultIndex];
      resetResult();
      renderState();
      setMessage(`「${formatResult(heldItem)}」は候補に残しました。`);
    }

    function applyItems() {
      if (spinning || currentResultIndex !== null) {
        return;
      }

      const nextCandidates = buildCandidates();

      if (nextCandidates.length === 0) {
        setMessage("候補を1件以上入力してください。", "error");
        return;
      }

      allCandidates = nextCandidates;
      updateVisibleCandidates();
      currentRotation = 0;
      resetResult();
      renderInputGroups();
      renderState();
      drawWheel(0);
      setMessage(
        candidates.length > 0
          ? "ジャンルと候補をルーレットに反映しました。"
          : "候補を反映しました。現在はすべてのジャンルが非表示です。",
        "success"
      );
    }

    function resetAll() {
      inputGroups = createDefaultGroups();
      allCandidates = buildCandidates();
      updateVisibleCandidates();
      selectedItems = [];
      currentRotation = 0;
      resetResult();
      renderInputGroups();
      renderState();
      drawWheel(0);
      setMessage("初期状態に戻しました。");
    }

    function applyGenreVisibility(groupId, visible) {
      if (isFilterLocked()) {
        return;
      }

      const group = inputGroups.find((item) => item.id === groupId);
      if (!group) {
        return;
      }

      group.visible = visible;
      updateVisibleCandidates();
      currentRotation = 0;
      resetResult();
      renderState();
      drawWheel(0);
      setMessage(
        `${displayGenre(group.genre)}をルーレットで${visible ? "表示" : "非表示"}にしました。`
      );
    }

    function applyAllGenreVisibility(visible) {
      if (isFilterLocked()) {
        return;
      }

      inputGroups.forEach((group) => {
        group.visible = visible;
      });
      updateVisibleCandidates();
      currentRotation = 0;
      resetResult();
      renderState();
      drawWheel(0);
      setMessage(visible ? "すべてのジャンルを表示しました。" : "すべてのジャンルを非表示にしました。");
    }

    inputGroupsContainer.addEventListener("input", (event) => {
      const wrapper = event.target.closest(".input-group");
      const field = event.target.dataset.field;
      if (!wrapper || !field) {
        return;
      }

      const group = inputGroups.find((item) => item.id === wrapper.dataset.groupId);
      if (group) {
        group[field] = event.target.value;
      }
    });

    inputGroupsContainer.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      const wrapper = event.target.closest(".input-group");
      if (!button || !wrapper || spinning) {
        return;
      }

      const groupIndex = inputGroups.findIndex((item) => item.id === wrapper.dataset.groupId);
      if (groupIndex === -1) {
        return;
      }

      if (button.dataset.action === "add") {
        inputGroups.splice(groupIndex + 1, 0, createGroup());
        renderInputGroups();
        const addedGroup = inputGroups[groupIndex + 1];
        document.getElementById(`genre-${addedGroup.id}`)?.focus();
        return;
      }

      if (button.dataset.action === "remove" && inputGroups.length > 1) {
        inputGroups.splice(groupIndex, 1);
        renderInputGroups();
        setMessage("入力グループを削除しました。候補へ反映するには「候補を反映」を押してください。");
      }
    });

    genreList.addEventListener("click", (event) => {
      const button = event.target.closest('button[data-action="toggle-visibility"]');
      const item = event.target.closest(".list-item");
      if (!button || !item || isFilterLocked()) {
        return;
      }

      const group = inputGroups.find((entry) => entry.id === item.dataset.groupId);
      if (!group) {
        return;
      }

      applyGenreVisibility(group.id, !group.visible);
    });

    showAllGenresButton.addEventListener("click", () => applyAllGenreVisibility(true));
    hideAllGenresButton.addEventListener("click", () => applyAllGenreVisibility(false));
    spinButton.addEventListener("click", spinRoulette);
    decisionButton.addEventListener("click", decideResult);
    holdButton.addEventListener("click", holdResult);
    applyButton.addEventListener("click", applyItems);
    resetButton.addEventListener("click", resetAll);

    allCandidates = buildCandidates();
    updateVisibleCandidates();
    renderInputGroups();
    renderState();
    drawWheel();
  </script>
</body>
</html>
